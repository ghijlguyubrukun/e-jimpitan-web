<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Jimpitan</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (Versi Stabil 18.2.0 via CDNJS) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone (Dikunci di versi 7.23.6 yang aman dari Bug Import) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <!-- Lucide Icons & HTML5 QR Code Scanner (Dikunci versinya) -->
  <script src="https://unpkg.com/lucide@0.344.0"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycby8DulHa_EF1FOUTNoM9oPaKW8f1ZZ8f9w6zNenx-2dIx6TjyXWyKKqUlPSpdL_QwwL/exec';

    window.ambilDataDariSpreadsheet = async function() {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 detik timeout

        const response = await fetch(scriptURL, { signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (!response.ok) {
           console.warn("Server HTTP Error:", response.status);
           return null;
        }

        const text = await response.text(); 
        try {
          const hasil = JSON.parse(text);
          if (hasil.status === 'success') return hasil.data;
          return null;
        } catch(e) {
          console.error("Apps Script tidak merespons JSON yang valid.");
          return null;
        }
      } catch (error) {
        console.error("Gagal mengambil data:", error.message);
        return null;
      }
    };

    window.simpanDataKeSpreadsheet = async function(kunciData, dataArrayBaru) {
      try {
        let cleanedData = dataArrayBaru;
        if (Array.isArray(dataArrayBaru)) {
            cleanedData = dataArrayBaru.map(item => {
                if (item && typeof item === 'object') {
                    const { foto, ...rest } = item;
                    return rest;
                }
                return item;
            });
        }

        const response = await fetch(scriptURL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ key: kunciData, data: cleanedData })
        });
        
        const text = await response.text();
        try {
          const hasil = JSON.parse(text);
          if (hasil.status === 'success') return true;
          alert("GAGAL MENYIMPAN KE DATABASE:\n" + hasil.message);
          return false;
        } catch(e) {
          alert("GAGAL MENYIMPAN: Sistem gagal merespons.");
          return false;
        }
      } catch (error) {
        alert('Terjadi error jaringan. Cek koneksi internet Anda.');
        return false;
      }
    };
  </script>

  <style>

      * { overflow: visible !important; height: auto !important; }
      body { background-color: white !important; color: black !important; font-size: 12px; }

<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const getLocalToday = () => {
      const tzOffset = (new Date()).getTimezoneOffset() * 60000;
      return new Date(Date.now() - tzOffset).toISOString().split('T')[0];
    };

    const LucideIcon = ({ name, size = 24, className = "" }) => {
      const spanRef = useRef(null);
      useEffect(() => {
        const renderIcon = () => {
          if (window.lucide && spanRef.current) {
            try {
              spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
              window.lucide.createIcons({ root: spanRef.current, attrs: { width: size, height: size } });
            } catch (err) { console.error("Lucide Error", err); }
          }
        };
        renderIcon();
        if (!window.lucide) {
          const timer = setTimeout(renderIcon, 500);
          return () => clearTimeout(timer);
        }
      }, [name, size]);
      return <span ref={spanRef} className={className} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size }}></span>;
    };

    const Menu = (p) => <LucideIcon name="menu" {...p} />;
    const X = (p) => <LucideIcon name="x" {...p} />;
    const Users = (p) => <LucideIcon name="users" {...p} />;
    const CalendarDays = (p) => <LucideIcon name="calendar-days" {...p} />;
    const QrCode = (p) => <LucideIcon name="qr-code" {...p} />;
    const ClipboardList = (p) => <LucideIcon name="clipboard-list" {...p} />;
    const LayoutDashboard = (p) => <LucideIcon name="layout-dashboard" {...p} />;
    const Camera = (p) => <LucideIcon name="camera" {...p} />;
    const Plus = (p) => <LucideIcon name="plus" {...p} />;
    const Trash2 = (p) => <LucideIcon name="trash-2" {...p} />;
    const CheckCircle = (p) => <LucideIcon name="check-circle" {...p} />;
    const AlertCircle = (p) => <LucideIcon name="alert-circle" {...p} />;
    const Settings = (p) => <LucideIcon name="settings" {...p} />;
    const Moon = (p) => <LucideIcon name="moon" {...p} />;
    const Sun = (p) => <LucideIcon name="sun" {...p} />;
    const Palette = (p) => <LucideIcon name="palette" {...p} />;
    const UserPlus = (p) => <LucideIcon name="user-plus" {...p} />;
    const Upload = (p) => <LucideIcon name="upload" {...p} />;
    const FileDown = (p) => <LucideIcon name="file-down" {...p} />;
    const ShieldCheck = (p) => <LucideIcon name="shield-check" {...p} />;
    const CheckSquare = (p) => <LucideIcon name="check-square" {...p} />;
    const LogOut = (p) => <LucideIcon name="log-out" {...p} />;
    const UserCircle = (p) => <LucideIcon name="user-circle" {...p} />;
    const LogIn = (p) => <LucideIcon name="log-in" {...p} />;
    const KeyRound = (p) => <LucideIcon name="key-round" {...p} />;
    const Edit = (p) => <LucideIcon name="edit" {...p} />;
    const List = (p) => <LucideIcon name="list" {...p} />;
    const ImageIcon = (p) => <LucideIcon name="image" {...p} />;

    const initialWarga = [
      { id: 'H-01', nama: 'Budi Santoso', alamat: 'Blok H No 1', hp: '08123456789' },
      { id: 'H-02', nama: 'Andi Pratama', alamat: 'Blok H No 2', hp: '08123456780' },
      { id: 'G-01', nama: 'Siti Aminah', alamat: 'Blok G No 1', hp: '08129876543' }
    ];
    const initialJadwal = [
      { id: 'J-SEN', hari: 'Senin', periode: 'Bulan Juni - Agustus 2026', koordinatorId: 'H-01', anggotaIds: ['H-02'] }
    ];
    const initialAbsensi = [];
    const initialJimpitan = [];
    const initialAccounts = [
      { id: 1, username: 'admin', password: '123', role: 'Admin Jimpitan', nama: 'Superadmin', wargaId: null },
      { id: 2, username: 'budi', password: '123', role: 'Koordinator', nama: 'Budi Santoso', wargaId: 'H-01' }
    ];

    const colorPalettes = {
      blue: { main: 'bg-blue-600', text: 'text-blue-600', hover: 'hover:bg-blue-700', light: 'bg-blue-50', border: 'border-blue-200', bar: '#3B82F6' },
      emerald: { main: 'bg-emerald-600', text: 'text-emerald-600', hover: 'hover:bg-emerald-700', light: 'bg-emerald-50', border: 'border-emerald-200', bar: '#10B981' },
      violet: { main: 'bg-violet-600', text: 'text-violet-600', hover: 'hover:bg-violet-700', light: 'bg-violet-50', border: 'border-violet-200', bar: '#8B5CF6' },
    };

    const LoginScreen = ({ ctx }) => {
      const { accounts = [], setCurrentUser, setIsPublicView, setActiveTab, isDarkMode, theme, ui, settings } = ctx;
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleLogin = (e) => {
        e.preventDefault();
        const cleanUsername = username.trim().toLowerCase();
        const user = accounts.find(a => a.username.toLowerCase() === cleanUsername && a.password === password);
        if (user) {
          setCurrentUser(user);
          setIsPublicView(false);
          setActiveTab('dashboard');
        } else {
          setError('Username atau password salah!');
        }
      };

      return (
          <div className={`min-h-screen flex items-center justify-center p-4 ${isDarkMode ? 'bg-gray-900' : 'bg-gray-100'}`}>
            <div className={`w-full max-w-md p-8 rounded-2xl shadow-xl ${isDarkMode ? 'bg-gray-800 text-white' : 'bg-white text-gray-900'}`}>
              <div className="text-center mb-8">
                <div className={`w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-4 ${theme?.light || 'bg-blue-50'}`}>
                  <ShieldCheck size={40} className={theme?.text || 'text-blue-600'} />
                </div>
                <h1 className="text-2xl font-black">{settings?.webName || 'e-Jimpitan'}</h1>
                <p className="text-sm text-gray-500 mt-1">{settings?.tagline || 'Sistem Keuangan Warga'}</p>
              </div>
              <form onSubmit={handleLogin} className="space-y-5">
                {error && <div className="p-3 bg-red-100 text-red-700 rounded-lg text-sm font-semibold">{error}</div>}
                <div>
                  <label className="block text-sm font-bold mb-2">Username</label>
                  <input type="text" required className={`w-full p-3 rounded-lg border ${ui?.input || ''}`} value={username} onChange={e => setUsername(e.target.value)} placeholder="Masukkan username..." />
                </div>
                <div>
                  <label className="block text-sm font-bold mb-2">Password</label>
                  <input type="password" required className={`w-full p-3 rounded-lg border ${ui?.input || ''}`} value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" />
                </div>
                <button type="submit" className={`w-full p-3 rounded-lg font-bold text-white shadow-lg transition hover:opacity-90 flex items-center justify-center gap-2 ${theme?.main || 'bg-blue-600'}`}>
                  <LogIn size={20} /> Login Petugas
                </button>
              </form>
              <div className="mt-8 text-center border-t border-gray-200 dark:border-gray-700 pt-6">
                <button type="button" onClick={() => setIsPublicView(true)} className="w-full flex items-center justify-center gap-2 p-3 rounded-lg font-bold text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition">
                  &larr; Kembali ke Portal Warga
                </button>
              </div>
            </div>
          </div>
        );
      };

    const Dashboard = ({ ctx }) => {
      const { jadwal, absensi, jimpitan, settings, currentUser, isPublicView, isAdmin, theme, ui, getWargaName } = ctx;
      
      const activePeriod = useMemo(() => {
        if (settings.activePeriode) return settings.activePeriode;
        const allPeriods = [...new Set(jadwal.map(x => x.periode).filter(Boolean))];
        return allPeriods.length > 0 ? allPeriods[allPeriods.length - 1] : null;
      }, [jadwal, settings.activePeriode]);

      const activeJadwal = useMemo(() => {
        return jadwal.filter(j => !activePeriod || j.periode === activePeriod);
      }, [jadwal, activePeriod]);

      const myJadwalIds = isAdmin || isPublicView 
        ? activeJadwal.map(j => j.id) 
        : activeJadwal.filter(j => j.koordinatorId === currentUser?.wargaId).map(j => j.id);
      
      const filteredAbsensi = isAdmin || isPublicView 
        ? absensi 
        : absensi.filter(a => myJadwalIds.includes(a.jadwalId));
      
      const totalJimpitan = jimpitan.reduce((sum, item) => sum + Number(item.nominal), 0);
      const totalDenda = absensi.filter(a => a.status === 'Alpa').length * (settings.nominalDenda || 0);

      const availableYears = useMemo(() => {
        const years = [...new Set(jimpitan.map(j => j.tahun))].filter(Boolean).sort().reverse();
        if (years.length === 0) return [new Date().getFullYear().toString()];
        return years;
      }, [jimpitan]);

      const [chartYear, setChartYear] = useState(availableYears[0]);
      
      const jimpitanChartData = useMemo(() => {
        const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const dataMap = {};
        monthNames.forEach(m => dataMap[m] = 0);
        
        jimpitan.forEach(curr => {
          if (curr.tahun === chartYear && dataMap[curr.bulan] !== undefined) {
            dataMap[curr.bulan] += Number(curr.nominal) || 0;
          }
        });
        
        return monthNames.map(m => ({ label: m, total: dataMap[m] }));
      }, [jimpitan, chartYear]);

      const maxJimpitan = jimpitanChartData.length > 0 ? Math.max(...jimpitanChartData.map(d => d.total)) : 1;

      const absenStats = useMemo(() => {
        const stats = { Hadir: 0, Sakit: 0, Izin: 0, Kerja: 0, Alpa: 0 };
        filteredAbsensi.forEach(a => { if (stats[a.status] !== undefined) stats[a.status]++; });
        const colors = { Hadir: '#10B981', Sakit: '#F59E0B', Izin: '#3B82F6', Kerja: '#8B5CF6', Alpa: '#EF4444' };
        
        return Object.keys(stats).map(key => ({
          name: key,
          value: stats[key],
          color: colors[key]
        })).filter(s => s.value > 0);
      }, [filteredAbsensi]);

      const totalAbsen = absenStats.reduce((sum, item) => sum + item.value, 0);

      const rekapWarga = useMemo(() => {
        return ctx.warga.map(w => {
          const txJimpitan = jimpitan.filter(t => t.wargaId === w.id);
          const txAbsen = absensi.filter(t => t.wargaId === w.id);
          const alpaCount = txAbsen.filter(t => t.status === 'Alpa').length;
          return {
            ...w,
            totalJimpitan: txJimpitan.reduce((sum, t) => sum + (Number(t.nominal) || 0), 0),
            hadir: txAbsen.filter(t => t.status === 'Hadir').length,
            alpa: alpaCount,
            denda: alpaCount * (settings.nominalDenda || 0),
          };
        });
      }, [ctx.warga, jimpitan, absensi, settings.nominalDenda]);

      return (
        <div className="space-y-6 animate-fade-in print-content">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className={`${theme.main} text-white p-6 rounded-xl shadow-lg flex items-center justify-between`}>
              <div>
                <p className="opacity-80 text-sm font-medium">Total Kas Jimpitan</p>
                <h3 className="text-3xl font-bold mt-1">Rp {totalJimpitan.toLocaleString('id-ID')}</h3>
              </div>
              <ShieldCheck size={40} className="opacity-80" />
            </div>
            <div className={`${ui.card} p-6 rounded-xl flex items-center justify-between`}>
              <div>
                <p className="text-gray-500 dark:text-gray-400 text-sm font-medium">Total Denda Terkumpul</p>
                <h3 className="text-3xl font-bold text-red-500">Rp {totalDenda.toLocaleString('id-ID')}</h3>
              </div>
              <AlertCircle size={40} className="text-red-500 opacity-80" />
            </div>
            <div className={`${ui.card} p-6 rounded-xl flex items-center justify-between`}>
              <div>
                <p className="text-gray-500 dark:text-gray-400 text-sm font-medium">{isAdmin || isPublicView ? 'Jadwal Ronda Aktif' : 'Regu Saya'}</p>
                <h3 className="text-3xl font-bold">{isAdmin || isPublicView ? activeJadwal.length : myJadwalIds.length} Regu</h3>
              </div>
              <CalendarDays size={40} className="text-orange-500 opacity-80" />
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 print-hide">
            <div className={`${ui.card} p-6 rounded-xl flex flex-col justify-between`}>
              <div className="flex justify-between items-start mb-2">
                <div>
                  <h3 className="text-lg font-semibold">Grafik Pemasukan Jimpitan</h3>
                  <p className="text-xs text-gray-400">Statistik kas bulanan per tahun</p>
                </div>
                <select className={`p-1.5 text-sm border rounded-lg ${ui.input} font-semibold`} value={chartYear} onChange={e => setChartYear(e.target.value)}>
                  {availableYears.map(y => <option key={y} value={y}>{y}</option>)}
                </select>
              </div>
              
              <div className="flex-1 flex items-end justify-between h-48 space-x-1 sm:space-x-2 border-b border-gray-200 dark:border-gray-700 pb-2 mt-4">
                {jimpitanChartData.every(d => d.total === 0) ? (
                  <div className="w-full flex items-center justify-center text-sm text-gray-400 italic">Belum ada data jimpitan di tahun {chartYear}.</div>
                ) : (
                  jimpitanChartData.map((data, idx) => {
                    const heightPercent = Math.max((data.total / (maxJimpitan || 1)) * 100, 2);
                    return (
                      <div key={idx} className="flex flex-col items-center flex-1 group h-full justify-end relative">
                        <div className="absolute -top-8 hidden group-hover:block bg-gray-800 text-white text-xs px-2 py-1 rounded whitespace-nowrap z-10 shadow-lg">
                          Rp {data.total.toLocaleString('id-ID')}
                        </div>
                        <div className="w-full max-w-[40px] rounded-t-sm transition-all duration-300" style={{ height: `${heightPercent}%`, backgroundColor: theme.bar, opacity: data.total === 0 ? 0.2 : 1 }}></div>
                        <div className="text-[10px] sm:text-xs text-gray-500 dark:text-gray-400 mt-2 font-semibold absolute -bottom-5">{data.label}</div>
                      </div>
                    )
                  })
                )}
              </div>
              <div className="h-5"></div> 
            </div>
            
            <div className={`${ui.card} p-6 rounded-xl flex flex-col`}>
              <h3 className="text-lg font-semibold mb-2">Statistik Kehadiran {isAdmin || isPublicView ? 'Global' : 'Regu'}</h3>
              <p className="text-xs text-gray-400 mb-6">Akumulasi status kehadiran anggota ronda</p>
              
              {totalAbsen === 0 ? (
                <div className="flex-1 flex items-center justify-center text-sm text-gray-400 italic">Belum ada data absensi.</div>
              ) : (
                <div className="flex flex-col flex-1 justify-center space-y-6">
                  <div className="w-full h-8 flex rounded-full overflow-hidden bg-gray-100 shadow-inner">
                    {absenStats.map((stat, idx) => (
                      <div 
                        key={idx} 
                        style={{ width: `${(stat.value / totalAbsen) * 100}%`, backgroundColor: stat.color }}
                        className="h-full flex items-center justify-center text-white text-xs font-bold transition-all"
                        title={`${stat.name}: ${stat.value}`}
                      >
                        {((stat.value / totalAbsen) * 100) > 10 ? `${Math.round((stat.value / totalAbsen) * 100)}%` : ''}
                      </div>
                    ))}
                  </div>
                  <div className="grid grid-cols-2 gap-3 mt-4">
                    {absenStats.map((stat, idx) => (
                      <div key={idx} className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full" style={{ backgroundColor: stat.color }}></div>
                        <span className="text-sm font-medium">{stat.name}</span>
                        <span className="text-xs text-gray-500 ml-auto bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded-full">{stat.value}x</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          {(isPublicView || isAdmin) && (
            <div className={`${ui.card} p-6 rounded-xl mt-6`}>
              <h3 className="text-lg font-semibold mb-4">Daftar Regu Aktif & Koordinator</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className={`${ui.tableHead} border-b text-sm`}>
                      <th className="p-4">Hari / Jadwal</th>
                      <th className="p-4">Koordinator</th>
                      <th className="p-4">Anggota Regu</th>
                    </tr>
                  </thead>
                  <tbody>
                    {activeJadwal.map(j => (
                      <tr key={j.id} className={`border-b ${ui.tableRow}`}>
                        <td className="p-4 font-bold">
                          {j.hari} <span className="text-xs font-normal bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded ml-2">{j.periode}</span>
                        </td>
                        <td className="p-4 flex items-center gap-2">
                          <UserCircle size={20} className="text-gray-400" />
                          {getWargaName(j.koordinatorId)}
                        </td>
                        <td className="p-4 text-sm text-gray-500 dark:text-gray-400">
                          {j.anggotaIds.map(id => getWargaName(id)).join(', ')}
                        </td>
                      </tr>
                    ))}
                    {activeJadwal.length === 0 && (
                      <tr>
                        <td colSpan="3" className="p-4 text-center text-sm text-gray-500">Belum ada regu pada periode ini.</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {isPublicView && (
            <div className={`${ui.card} p-6 rounded-xl mt-6`}>
              <h3 className="text-lg font-semibold mb-4">Laporan Transparansi Keuangan Warga</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className={`${ui.tableHead} border-b text-sm`}>
                      <th className="p-4">Nama Warga</th>
                      <th className="p-4 text-center">Hadir Ronda</th>
                      <th className="p-4 text-center text-red-500">Alpa</th>
                      <th className="p-4 text-right text-red-500">Tunggakan Denda</th>
                      <th className="p-4 text-right text-emerald-600">Total Jimpitan</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rekapWarga.map((r, i) => (
                      <tr key={i} className={`border-b ${ui.tableRow}`}>
                        <td className="p-4 font-medium flex items-center gap-2">
                          <UserCircle size={16} className="text-gray-400" />
                          {r.nama}
                        </td>
                        <td className="p-4 text-center">{r.hadir}x</td>
                        <td className="p-4 text-center font-bold text-red-500">{r.alpa}x</td>
                        <td className="p-4 text-right font-bold text-red-600">
                          {r.denda > 0 ? `Rp ${r.denda.toLocaleString('id-ID')}` : '-'}
                        </td>
                        <td className="p-4 text-right font-bold text-emerald-600">
                          Rp {r.totalJimpitan.toLocaleString('id-ID')}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    };

    const DataWarga = ({ ctx }) => {
      const { warga, setWarga, syncData, showToast, theme, ui } = ctx;
      const [showForm, setShowForm] = useState(false);
      const [isEditing, setIsEditing] = useState(false);
      
      const [newWarga, setNewWarga] = useState({ oldId: '', idBaru: '', nama: '', alamat: '', hp: '' });

      const handleAddWarga = async (e) => {
        e.preventDefault();
        const idCustom = newWarga.idBaru.trim().toUpperCase();
        
        if(!idCustom) return showToast("ID Barcode tidak boleh kosong!");
        
        let updatedWarga;
        if (isEditing) {
          if (idCustom !== newWarga.oldId && warga.some(w => w.id === idCustom)) {
            alert(`PERINGATAN: ID Barcode "${idCustom}" sudah dipakai oleh warga lain!\nSilakan masukkan ID atau Nomor Blok yang berbeda.`);
            return;
          }
          updatedWarga = warga.map(w => w.id === newWarga.oldId ? { ...w, id: idCustom, nama: newWarga.nama, alamat: newWarga.alamat, hp: newWarga.hp } : w);
        } else {
          if(warga.some(w => w.id === idCustom)) {
            alert(`PERINGATAN: ID Barcode "${idCustom}" sudah dipakai oleh warga lain!\nSilakan masukkan ID atau Nomor Blok yang berbeda.`);
            return;
          }
          updatedWarga = [...warga, { id: idCustom, nama: newWarga.nama, alamat: newWarga.alamat, hp: newWarga.hp }];
        }
        
        updatedWarga.sort((a, b) => a.id.localeCompare(b.id));
        setWarga(updatedWarga);
        setShowForm(false);
        
        const isSuccess = await syncData("warga", updatedWarga);
        if (isSuccess) {
          showToast(isEditing ? 'Data warga berhasil diperbarui!' : 'Data warga berhasil ditambahkan!');
          setIsEditing(false);
          setNewWarga({ oldId: '', idBaru: '', nama: '', alamat: '', hp: '' });
        } else {
          setWarga(warga);
          setShowForm(true);
        }
      };

      const handleEditClick = (w) => {
        setNewWarga({ oldId: w.id, idBaru: w.id, nama: w.nama, alamat: w.alamat, hp: w.hp });
        setIsEditing(true);
        setShowForm(true);
      };

      const handleDeleteWarga = (id) => {
        if(window.confirm('Apakah Anda yakin ingin menghapus data warga ini?')) {
          const updatedWarga = warga.filter(x => x.id !== id);
          setWarga(updatedWarga);
          syncData("warga", updatedWarga);
          showToast('Warga berhasil dihapus');
        }
      };

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="flex justify-between items-center">
            <h2 className="text-2xl font-bold">Data Warga & Tim Ronda</h2>
            <button onClick={() => { setShowForm(!showForm); setIsEditing(false); setNewWarga({ oldId: '', idBaru: '', nama: '', alamat: '', hp: '' }); }} className={`${theme.main} text-white px-4 py-2 rounded-lg shadow hover:opacity-90 flex items-center gap-2`}>
              {showForm ? <X size={18} /> : <Plus size={18} />} {showForm ? 'Batal' : 'Tambah Warga'}
            </button>
          </div>
          
          {showForm && (
            <form onSubmit={handleAddWarga} className={`${ui.card} p-6 rounded-xl animate-fade-in border-l-4 border-l-${theme.text.split('-')[1]}-500`}>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-semibold mb-1">ID Barcode (Cth: H-02, G-01, I-03)</label>
                  <input required type="text" className={`w-full p-2.5 rounded-lg border ${ui.input} uppercase`} value={newWarga.idBaru} onChange={e => setNewWarga({...newWarga, idBaru: e.target.value})} placeholder="Blok & No Rumah" />
                </div>
                <div>
                  <label className="block text-sm font-semibold mb-1">Nama Lengkap</label>
                  <input required type="text" className={`w-full p-2.5 rounded-lg border ${ui.input}`} value={newWarga.nama} onChange={e => setNewWarga({...newWarga, nama: e.target.value})} />
                </div>
                <div>
                  <label className="block text-sm font-semibold mb-1">No. Handphone</label>
                  <input required type="tel" className={`w-full p-2.5 rounded-lg border ${ui.input}`} value={newWarga.hp} onChange={e => setNewWarga({...newWarga, hp: e.target.value})} />
                </div>
                <div>
                  <label className="block text-sm font-semibold mb-1">Alamat Lengkap</label>
                  <input required type="text" className={`w-full p-2.5 rounded-lg border ${ui.input}`} value={newWarga.alamat} onChange={e => setNewWarga({...newWarga, alamat: e.target.value})} />
                </div>
              </div>
              <button type="submit" className={`mt-6 ${theme.main} text-white px-6 py-2.5 rounded-lg font-bold w-full md:w-auto`}>{isEditing ? 'Simpan Perubahan' : 'Simpan Data Warga'}</button>
            </form>
          )}

          <div className={`${ui.card} rounded-xl overflow-hidden`}>
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className={`${ui.tableHead} border-b text-sm`}>
                    <th className="p-4 w-12 text-center">No</th>
                    <th className="p-4">ID Barcode</th>
                    <th className="p-4">Nama Lengkap</th>
                    <th className="p-4">Alamat Rumah</th>
                    <th className="p-4">No. HP</th>
                    <th className="p-4 text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  {warga.map((w, idx) => (
                    <tr key={w.id} className={`border-b ${ui.tableRow}`}>
                      <td className="p-4 text-center text-sm font-bold text-gray-400">{idx + 1}</td>
                      <td className="p-4 font-mono font-bold text-gray-700 dark:text-gray-300">{w.id}</td>
                      <td className="p-4 font-semibold flex items-center gap-2">
                        <UserCircle size={18} className="text-gray-400" /> {w.nama}
                      </td>
                      <td className="p-4">{w.alamat}</td>
                      <td className="p-4">{w.hp}</td>
                      <td className="p-4 text-center">
                        <div className="flex items-center justify-center gap-2">
                          <button className="text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 p-2 rounded-full transition" onClick={() => handleEditClick(w)} title="Edit Warga">
                            <Edit size={16} />
                          </button>
                          <button className="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 p-2 rounded-full transition" onClick={() => handleDeleteWarga(w.id)} title="Hapus Warga">
                            <Trash2 size={16} />
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    const JadwalDanAbsen = ({ ctx }) => {
      const { isAdmin, jadwal, setJadwal, absensi, setAbsensi, jimpitan, setJimpitan, currentUser, getWargaName, syncData, showToast, theme, ui, settings, setSettings } = ctx;
      const [subTab, setSubTab] = useState('input_absen'); 
      const [selectedJadwalId, setSelectedJadwalId] = useState('');
      const [absenData, setAbsenData] = useState({}); 
      const [totalJimpitanManual, setTotalJimpitanManual] = useState(''); 
      const [filterPeriodeJadwal, setFilterPeriodeJadwal] = useState('Semua');
      
      const [inputDate, setInputDate] = useState(getLocalToday());

      const periodeOptionsJadwal = useMemo(() => ['Semua', ...new Set(jadwal.map(j => j.periode).filter(Boolean))], [jadwal]);

      const activePeriod = useMemo(() => {
        if (settings.activePeriode) return settings.activePeriode;
        const allPeriods = [...new Set(jadwal.map(x => x.periode).filter(Boolean))];
        return allPeriods.length > 0 ? allPeriods[allPeriods.length - 1] : null;
      }, [jadwal, settings.activePeriode]);

      const availableJadwalForDate = useMemo(() => {
        if (!inputDate) return []; // SAFETY NET: Hindari Error Tanggal Kosong
        const dateParts = inputDate.split('-'); 
        if (dateParts.length !== 3) return [];
        
        const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
        const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        const dayName = days[dateObj.getDay()];
        if (!dayName) return [];

        let filtered = jadwal.filter(j => j.hari.toLowerCase() === dayName.toLowerCase());
        
        if (activePeriod && activePeriod !== 'Semua') {
          filtered = filtered.filter(j => j.periode === activePeriod);
        }

        if (!isAdmin) {
          filtered = filtered.filter(j => j.koordinatorId === currentUser?.wargaId);
        }
        return filtered;
      }, [inputDate, jadwal, isAdmin, currentUser, activePeriod]);

      const [showAddJadwal, setShowAddJadwal] = useState(false);
      const [newJadwal, setNewJadwal] = useState({ hari: 'Senin', periode: '', koordinatorId: '', anggotaIds: [] });
      
      const mySchedules = isAdmin ? jadwal : jadwal.filter(j => j.koordinatorId === currentUser?.wargaId);
      
      const displayedSchedules = mySchedules.filter(j => {
        if (isAdmin) return filterPeriodeJadwal === 'Semua' || j.periode === filterPeriodeJadwal;
        return !activePeriod || j.periode === activePeriod;
      });

      useEffect(() => {
        if (selectedJadwalId) {
          const j = jadwal.find(x => x.id === selectedJadwalId);
          if (j) {
            const initData = {};
            initData[j.koordinatorId] = { status: 'Hadir', keterangan: '' };
            j.anggotaIds.forEach(id => { initData[id] = { status: 'Hadir', keterangan: '' }; });
            setAbsenData(initData);
          }
        } else { 
          setAbsenData({}); 
        }
      }, [selectedJadwalId, jadwal]);

      const handleSaveAbsen = (e) => {
        e.preventDefault();
        if (!inputDate) return showToast("Pilih tanggal terlebih dahulu!");
        
        const dateParts = inputDate.split('-'); 
        const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
        const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const monthStr = monthNames[dateObj.getMonth()];
        const yearStr = dateObj.getFullYear().toString();

        const newEntries = Object.keys(absenData).map(wId => ({
          id: Date.now() + Math.random(),
          tanggal: inputDate,
          bulan: monthStr,
          tahun: yearStr,
          jadwalId: selectedJadwalId, 
          wargaId: wId,
          status: absenData[wId].status, 
          keterangan: absenData[wId].keterangan
        }));
        
        const filteredAbsensi = absensi.filter(a => !(a.tanggal === inputDate && a.jadwalId === selectedJadwalId));
        const updatedAbsensi = [...newEntries, ...filteredAbsensi];
        
        setAbsensi(updatedAbsensi);
        syncData("absensi", updatedAbsensi);
        
        if (totalJimpitanManual && Number(totalJimpitanManual) >= 0 && isAdmin) {
            const newJimpitanManual = {
                id: Date.now() + Math.random(),
                tanggal: inputDate,
                bulan: monthStr,
                tahun: yearStr,
                jadwalId: selectedJadwalId,
                wargaId: 'KAS-UMUM',
                nominal: Number(totalJimpitanManual)
            };
            const filteredJimpitan = jimpitan.filter(j => !(j.tanggal === inputDate && j.jadwalId === selectedJadwalId && j.wargaId === 'KAS-UMUM'));
            const updatedJimpitan = [newJimpitanManual, ...filteredJimpitan];
            setJimpitan(updatedJimpitan);
            syncData("jimpitan", updatedJimpitan);
        }

        showToast('Data Absensi & Jimpitan Berhasil Disimpan!');
        setSelectedJadwalId('');
        setTotalJimpitanManual('');
      };

      const handleAddJadwal = (e) => {
        e.preventDefault();
        if (!newJadwal.koordinatorId) { showToast('Gagal: Pilih koordinator regu terlebih dahulu!'); return; }
        const newId = `J-${newJadwal.hari.toUpperCase().substring(0, 3)}-${Date.now()}`;
        const updatedJadwal = [...jadwal, { id: newId, ...newJadwal }];
        setJadwal(updatedJadwal);
        syncData("jadwal", updatedJadwal);
        setShowAddJadwal(false); 
        setNewJadwal({ hari: 'Senin', periode: '', koordinatorId: '', anggotaIds: [] });
        showToast('Jadwal baru berhasil ditambahkan!');
      };

      const handleDeleteJadwal = (id) => {
        if(window.confirm('Apakah Anda yakin ingin menghapus Regu/Jadwal ini?')) {
          const updatedJadwal = jadwal.filter(j => j.id !== id);
          setJadwal(updatedJadwal);
          syncData("jadwal", updatedJadwal);
          showToast('Jadwal regu berhasil dihapus');
        }
      };

      const handleAddMemberToRegu = (jadwalId, wargaId) => {
        if (!wargaId) return;
        const updatedJadwal = jadwal.map(j => {
          if (j.id === jadwalId && !j.anggotaIds.includes(wargaId)) {
            return { ...j, anggotaIds: [...j.anggotaIds, wargaId] };
          }
          return j;
        });
        setJadwal(updatedJadwal);
        syncData("jadwal", updatedJadwal);
        showToast('Anggota berhasil ditambahkan ke regu!');
      };

      const handleRemoveMemberFromRegu = (jadwalId, wargaId) => {
        if(window.confirm('Hapus anggota ini dari regu ronda?')) {
          const updatedJadwal = jadwal.map(j => {
            if (j.id === jadwalId) {
              return { ...j, anggotaIds: j.anggotaIds.filter(id => id !== wargaId) };
            }
            return j;
          });
          setJadwal(updatedJadwal);
          syncData("jadwal", updatedJadwal);
          showToast('Anggota dihapus dari regu!');
        }
      };

      const riwayatAbsensi = useMemo(() => {
        if (!selectedJadwalId) return [];
        const records = absensi.filter(a => a.jadwalId === selectedJadwalId);
        const grouped = records.reduce((acc, curr) => {
          if (!acc[curr.tanggal]) acc[curr.tanggal] = { tanggal: curr.tanggal, Hadir: 0, Alpa: 0, IzinSakit: 0 };
          if (curr.status === 'Hadir') acc[curr.tanggal].Hadir++;
          else if (curr.status === 'Alpa') acc[curr.tanggal].Alpa++;
          else acc[curr.tanggal].IzinSakit++;
          return acc;
        }, {});
        return Object.values(grouped).sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal)).slice(0, 5);
      }, [absensi, selectedJadwalId]);

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <h2 className="text-2xl font-bold">Jadwal & Absensi Ronda</h2>
            {isAdmin && (
              <div className={`flex bg-gray-200 dark:bg-gray-700 p-1 rounded-lg`}>
                <button onClick={() => setSubTab('input_absen')} className={`px-4 py-2 rounded-md text-sm font-semibold transition ${subTab === 'input_absen' ? 'bg-white shadow dark:bg-gray-800 dark:text-white' : 'text-gray-600 dark:text-gray-300'}`}>Input Absen Harian</button>
                <button onClick={() => setSubTab('atur_jadwal')} className={`px-4 py-2 rounded-md text-sm font-semibold transition ${subTab === 'atur_jadwal' ? 'bg-white shadow dark:bg-gray-800 dark:text-white' : 'text-gray-600 dark:text-gray-300'}`}>Atur Jadwal</button>
              </div>
            )}
          </div>

          {subTab === 'input_absen' || !isAdmin ? (
            <div className={`${ui.card} p-6 rounded-xl`}>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <div>
                  <label className="block text-sm font-semibold mb-2">Tanggal Absensi & Jimpitan</label>
                  <input 
                    type="date" 
                    className={`w-full p-3 rounded-lg border ${ui.input} ${!isAdmin ? 'bg-gray-100 dark:bg-gray-800 opacity-80 cursor-not-allowed' : ''}`} 
                    value={inputDate} 
                    min={!isAdmin ? getLocalToday() : undefined}
                    max={!isAdmin ? getLocalToday() : undefined}
                    readOnly={!isAdmin}
                    onChange={e => {
                      if (!isAdmin) {
                        showToast("Koordinator tidak dapat mengubah tanggal.");
                        return;
                      }
                      setInputDate(e.target.value);
                    }} 
                    required 
                  />
                  <p className="text-xs text-gray-500 mt-1">
                    {isAdmin ? "Ubah tanggal jika ingin input manual untuk hari lain." : "Tanggal otomatis dikunci ke hari ini untuk mencegah kecurangan."}
                  </p>
                </div>
                <div>
                  <label className="block text-sm font-semibold mb-2">Pilih Regu Bertugas</label>
                  <select className={`w-full p-3 rounded-lg border ${ui.input}`} value={selectedJadwalId} onChange={(e) => setSelectedJadwalId(e.target.value)}>
                    <option value="">-- Pilih Jadwal --</option>
                    {availableJadwalForDate.map(j => <option key={j.id} value={j.id}>Regu Hari {j.hari} ({j.periode})</option>)}
                  </select>
                  {availableJadwalForDate.length === 0 && inputDate && <p className="text-xs text-red-500 mt-1">Regu Anda tidak dijadwalkan pada hari ini.</p>}
                </div>
              </div>

              {selectedJadwalId && (
                <div className="animate-fade-in">
                  <form onSubmit={handleSaveAbsen} className="space-y-6">
                    <div className="overflow-x-auto">
                      <table className="w-full text-left border-collapse">
                        <thead>
                          <tr className={`${ui.tableHead} border-b text-sm`}>
                            <th className="p-3">Anggota</th>
                            <th className="p-3">Kehadiran</th>
                            <th className="p-3">Keterangan</th>
                          </tr>
                        </thead>
                        <tbody>
                          {Object.keys(absenData).map(wId => (
                            <tr key={wId} className={`border-b ${ui.tableRow}`}>
                              <td className="p-3">
                                <p className="font-semibold flex items-center gap-2">
                                  <UserCircle size={16}/>
                                  {getWargaName(wId)}
                                </p>
                              </td>
                              <td className="p-3">
                                <div className="flex flex-wrap gap-3">
                                  {['Hadir', 'Sakit', 'Izin', 'Kerja', 'Alpa'].map(sts => (
                                    <label key={sts} className="flex items-center gap-1 cursor-pointer text-sm">
                                      <input type="radio" value={sts} checked={absenData[wId].status === sts} onChange={() => setAbsenData({...absenData, [wId]: {...absenData[wId], status: sts}})} className="w-4 h-4"/>
                                      <span className={sts === 'Alpa' ? 'text-red-600 font-bold' : ''}>{sts}</span>
                                    </label>
                                  ))}
                                </div>
                              </td>
                              <td className="p-3">
                                <input type="text" placeholder="Catatan..." className={`w-full p-2 rounded border ${ui.input}`} value={absenData[wId].keterangan} onChange={(e) => setAbsenData({...absenData, [wId]: {...absenData[wId], keterangan: e.target.value}})} />
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>

                    {isAdmin && (
                      <div className="mt-4 p-4 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800 rounded-lg">
                        <label className="block text-sm font-semibold mb-2 text-emerald-800 dark:text-emerald-300">
                          Input Kumulatif Hasil Jimpitan Regu (Rp) - Opsional
                        </label>
                        <input
                          type="number"
                          placeholder="Contoh: 7000"
                          className={`w-full p-3 rounded-lg border ${ui.input} text-lg font-bold text-emerald-700 dark:text-emerald-400`}
                          value={totalJimpitanManual}
                          onChange={e => setTotalJimpitanManual(e.target.value)}
                        />
                        <p className="text-xs text-emerald-600 dark:text-emerald-400 mt-1">
                          Isi jika admin ingin langsung memasukkan total uang jimpitan tanpa fitur Scan Barcode satu-per-satu.
                        </p>
                      </div>
                    )}

                    <div className="flex justify-end">
                      <button type="submit" className={`${theme.main} text-white font-bold py-3 px-8 rounded-lg shadow-lg transition`}>Simpan Rekam Data</button>
                    </div>
                  </form>
                  
                  <div className="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700">
                    <h4 className="font-bold text-sm text-gray-500 mb-3 uppercase tracking-wider">Riwayat Input Absensi Regu Ini</h4>
                    {riwayatAbsensi.length > 0 ? (
                      <div className="flex flex-wrap gap-3">
                        {riwayatAbsensi.map((r, idx) => (
                          <div key={idx} className="bg-gray-100 dark:bg-gray-700 p-3 rounded-lg text-sm flex gap-4 border border-gray-200 dark:border-gray-600">
                            <span className="font-bold">{r.tanggal}</span>
                            <span>✅ Hadir: {r.Hadir}</span>
                            {r.Alpa > 0 && <span className="text-red-500 font-bold">❌ Alpa: {r.Alpa}</span>}
                          </div>
                        ))}
                      </div>
                    ) : (
                      <p className="text-sm italic text-gray-400">Belum ada riwayat absensi yang tercatat untuk regu ini.</p>
                    )}
                  </div>
                </div>
              )}
              
              {/* TAMPILAN REGU UNTUK KOORDINATOR */}
              {!isAdmin && displayedSchedules.length > 0 && (
                <div className="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700">
                  <div className="mb-4">
                    <h4 className="font-bold text-sm text-gray-500 uppercase tracking-wider">Informasi Regu Anda (Periode Aktif)</h4>
                  </div>
                  <div className="grid grid-cols-1 gap-6">
                    {displayedSchedules.map(j => (
                      <div key={j.id} className="p-5 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm">
                        <div className="flex justify-between items-start mb-4">
                          <div>
                            <h3 className="text-lg font-bold mb-1">Regu Hari {j.hari}</h3>
                            <span className="text-xs bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded">Periode: {j.periode}</span>
                          </div>
                        </div>
                        <div className="space-y-3">
                          <div className="bg-gray-50 dark:bg-gray-800 p-3 rounded border dark:border-gray-600">
                            <span className="text-xs font-semibold text-gray-500 uppercase block mb-1">Koordinator</span>
                            <div className="flex items-center gap-2 font-medium"><CheckCircle size={16} className="text-emerald-500"/> {getWargaName(j.koordinatorId)}</div>
                          </div>
                          <div>
                            <span className="text-xs font-semibold text-gray-500 uppercase block mb-2">Anggota Regu</span>
                            <ul className="space-y-2">
                              {j.anggotaIds.map(aId => (
                                <li key={aId} className="flex items-center gap-2 px-3 py-2 rounded border dark:border-gray-600">
                                  <Users size={16} className="text-blue-400"/> {getWargaName(aId)}
                                </li>
                              ))}
                            </ul>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ) : (
            <div className="space-y-6">
              {isAdmin && (
                <div className={`mb-4 p-5 rounded-xl border border-blue-200 bg-blue-50 dark:bg-blue-900/20 dark:border-blue-800 shadow-sm`}>
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                      <h4 className="font-bold text-blue-800 dark:text-blue-300">Setel Periode Aktif</h4>
                      <p className="text-xs text-blue-600 dark:text-blue-400 mt-1">Koordinator hanya akan melihat & input jadwal pada periode yang dipilih ini.</p>
                    </div>
                    <select 
                      className={`p-2.5 rounded-lg border ${ui.input} text-sm min-w-[200px] font-bold shadow-sm`}
                      value={settings.activePeriode || ''}
                      onChange={(e) => {
                        const newSettings = {...settings, activePeriode: e.target.value};
                        setSettings(newSettings);
                        syncData("settings", newSettings);
                        showToast("Periode aktif berhasil diperbarui!");
                      }}
                    >
                      <option value="">-- Gunakan Periode Terbaru --</option>
                      {periodeOptionsJadwal.filter(p => p !== 'Semua').map(p => (
                        <option key={p} value={p}>{p}</option>
                      ))}
                    </select>
                  </div>
                </div>
              )}

              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                <h3 className="text-xl font-bold">Daftar Regu Ronda</h3>
                <div className="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                  {isAdmin && (
                    <select className={`p-2 rounded border ${ui.input} text-sm flex-1 sm:flex-none`} value={filterPeriodeJadwal} onChange={e => setFilterPeriodeJadwal(e.target.value)}>
                      {periodeOptionsJadwal.map(p => <option key={p} value={p}>{p === 'Semua' ? 'Semua Periode' : p}</option>)}
                    </select>
                  )}
                  <button onClick={() => setShowAddJadwal(!showAddJadwal)} className={`${theme.main} text-white px-4 py-2 rounded-lg shadow flex items-center justify-center gap-2 flex-1 sm:flex-none whitespace-nowrap`}>
                    {showAddJadwal ? <X size={18} /> : <Plus size={18} />} Tambah Jadwal Baru
                  </button>
                </div>
              </div>
              
              {showAddJadwal && (
                <form onSubmit={handleAddJadwal} className={`${ui.card} p-6 rounded-xl animate-fade-in shadow-md`}>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-semibold mb-1">Hari Bertugas</label>
                      <select required className={`w-full p-2.5 rounded-lg border ${ui.input}`} value={newJadwal.hari} onChange={e => setNewJadwal({...newJadwal, hari: e.target.value})}>
                        {['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu', 'Minggu'].map(h => <option key={h} value={h}>{h}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold mb-1">Periode Jadwal</label>
                      <input required type="text" placeholder="Contoh: Bulan Juni - Agustus 2026" className={`w-full p-2.5 rounded-lg border ${ui.input}`} value={newJadwal.periode} onChange={e => setNewJadwal({...newJadwal, periode: e.target.value})} />
                    </div>
                    <div className="md:col-span-2">
                      <label className="block text-sm font-semibold mb-1">Koordinator</label>
                      <select required className={`w-full p-2.5 rounded-lg border ${ui.input}`} value={newJadwal.koordinatorId} onChange={e => setNewJadwal({...newJadwal, koordinatorId: e.target.value})}>
                        <option value="">-- Pilih --</option>
                        {ctx.warga.map(w => <option key={w.id} value={w.id}>{w.nama} ({w.id})</option>)}
                      </select>
                    </div>
                    <div className="md:col-span-2">
                      <label className="block text-sm font-semibold mb-3">Anggota Regu (Multiselect)</label>
                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                        {ctx.warga.filter(w => w.id !== newJadwal.koordinatorId).map(w => (
                          <label key={w.id} className="flex items-center gap-3 p-2 border rounded cursor-pointer">
                            <input type="checkbox" checked={newJadwal.anggotaIds.includes(w.id)} onChange={(e) => setNewJadwal({...newJadwal, anggotaIds: e.target.checked ? [...newJadwal.anggotaIds, w.id] : newJadwal.anggotaIds.filter(id => id !== w.id)})} />
                            <span className="text-sm">{w.nama}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  </div>
                  <button type="submit" className={`mt-6 ${theme.main} text-white px-6 py-2.5 rounded-lg font-bold`}>Simpan Jadwal</button>
                </form>
              )}

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {displayedSchedules.map(j => (
                  <div key={j.id} className={`${ui.card} p-5 rounded-xl border-t-4 border-t-${theme.text.split('-')[1]}-500 shadow-sm flex flex-col justify-between`}>
                    <div>
                      <div className="flex justify-between items-start mb-4">
                        <div>
                          <h3 className="text-xl font-bold mb-1">Hari {j.hari}</h3>
                          <span className="text-xs bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded">Periode: {j.periode}</span>
                        </div>
                        <button onClick={() => handleDeleteJadwal(j.id)} className="text-gray-400 hover:text-red-500"><Trash2 size={18} /></button>
                      </div>
                      <div className="space-y-3 mb-4">
                        <div className="bg-gray-50 dark:bg-gray-700 p-3 rounded border dark:border-gray-600">
                          <span className="text-xs font-semibold text-gray-500 uppercase block mb-1">Koordinator</span>
                          <div className="flex items-center gap-2 font-medium"><CheckCircle size={16} className="text-emerald-500"/> {getWargaName(j.koordinatorId)}</div>
                        </div>
                        <div>
                          <span className="text-xs font-semibold text-gray-500 uppercase block mb-2">Anggota Regu</span>
                          <ul className="space-y-2">
                            {j.anggotaIds.map(aId => (
                              <li key={aId} className="flex items-center justify-between px-3 py-2 rounded border dark:border-gray-700">
                                <div className="flex items-center gap-2"><Users size={16} className="text-blue-400"/> {getWargaName(aId)}</div>
                                <button type="button" onClick={() => handleRemoveMemberFromRegu(j.id, aId)} className="text-red-400 hover:text-red-600" title="Hapus Anggota"><X size={14} /></button>
                              </li>
                            ))}
                          </ul>
                        </div>
                      </div>
                    </div>
                    
                    <div className="mt-2 pt-4 border-t border-gray-100 dark:border-gray-700">
                      <select 
                        className={`w-full p-2 rounded border ${ui.input} text-sm`} 
                        onChange={(e) => { handleAddMemberToRegu(j.id, e.target.value); e.target.value = ''; }}
                        defaultValue=""
                      >
                        <option value="" disabled>+ Tambah Anggota Ronda...</option>
                        {ctx.warga.filter(w => w.id !== j.koordinatorId && !j.anggotaIds.includes(w.id)).map(w => (
                          <option key={w.id} value={w.id}>{w.nama}</option>
                        ))}
                      </select>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    const ScanJimpitan = ({ ctx }) => {
      const { warga, jadwal, currentUser, isAdmin, jimpitan, setJimpitan, syncData, showToast, theme, ui, settings } = ctx;
      
      const [scannedWarga, setScannedWarga] = useState(null);
      const [manualId, setManualId] = useState('');
      const [inputDate, setInputDate] = useState(getLocalToday());

      const activePeriod = useMemo(() => {
        if (settings.activePeriode) return settings.activePeriode;
        const allPeriods = [...new Set(jadwal.map(x => x.periode).filter(Boolean))];
        return allPeriods.length > 0 ? allPeriods[allPeriods.length - 1] : null;
      }, [jadwal, settings.activePeriode]);
      
      const availableJadwalForDate = useMemo(() => {
        if (!inputDate) return []; // SAFETY NET
        const dateParts = inputDate.split('-');
        if (dateParts.length !== 3) return [];
        const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
        const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        const selectedDayName = days[dateObj.getDay()];
        if (!selectedDayName) return [];

        let filtered = jadwal.filter(j => j.hari.toLowerCase() === selectedDayName.toLowerCase());
        
        if (activePeriod && activePeriod !== 'Semua') {
          filtered = filtered.filter(j => j.periode === activePeriod);
        }

        if (!isAdmin) {
          filtered = filtered.filter(j => j.koordinatorId === currentUser?.wargaId);
        }
        return filtered;
      }, [inputDate, jadwal, isAdmin, currentUser, activePeriod]);

      const [selectedJadwalId, setSelectedJadwalId] = useState('');

      useEffect(() => {
        if (availableJadwalForDate.length > 0) {
          setSelectedJadwalId(availableJadwalForDate[0].id);
        } else {
          setSelectedJadwalId('');
        }
      }, [availableJadwalForDate]);

      const [isCameraActive, setIsCameraActive] = useState(false);
      const scannerRef = useRef(null);

      const checkAlreadyPaid = (wId) => {
        return jimpitan.some(j => j.tanggal === inputDate && (j.jadwalId === selectedJadwalId || (!selectedJadwalId && j.jadwalId === 'Tanpa Regu')) && j.wargaId === wId);
      }

      const startCamera = () => {
        setIsCameraActive(true);
        setTimeout(() => {
          if (!document.getElementById("qr-reader")) {
             setIsCameraActive(false);
             return;
          }
          if (!window.Html5Qrcode) {
             showToast("Sistem Scanner gagal memuat, pastikan internet stabil.");
             setIsCameraActive(false);
             return;
          }
          
          const html5QrCode = new window.Html5Qrcode("qr-reader");
          scannerRef.current = html5QrCode;
          
          html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
              const w = warga.find(x => x.id === decodedText.trim().toUpperCase());
              if (w) {
                if (checkAlreadyPaid(w.id)) {
                   showToast(`Warga ${w.nama} sudah setor jimpitan hari ini!`);
                   stopCamera();
                } else {
                   setScannedWarga(w);
                   stopCamera();
                }
              } else {
                showToast('Barcode tidak valid atau data warga tidak ditemukan!');
              }
            },
            (errorMessage) => {}
          ).catch((err) => {
            showToast("Gagal akses kamera. Pastikan perangkat Anda mendukung atau berikan izin browser.");
            setIsCameraActive(false);
          });
        }, 300); // Sedikit delay agar DOM siap
      };

      const stopCamera = async () => {
        if (scannerRef.current) {
          try {
            if (scannerRef.current.getState() === 2) {
              await scannerRef.current.stop();
            }
            scannerRef.current.clear();
          } catch(e) {
             console.warn("Kamera sudah tertutup", e);
          }
          scannerRef.current = null;
        }
        setIsCameraActive(false);
      };

      useEffect(() => {
        return () => {
           if (scannerRef.current) stopCamera();
        };
      }, []);
      
      const handleManualSubmit = (e) => {
        e.preventDefault();
        const w = warga.find(x => x.id === manualId.toUpperCase());
        if (w) {
          if (checkAlreadyPaid(w.id)) {
            showToast(`Warga ${w.nama} sudah setor jimpitan hari ini!`);
          } else {
            setScannedWarga(w); 
          }
        } else {
          showToast('Barcode Rumah tidak ditemukan!');
        }
      };

      const handleQuickSave = (nom) => {
        if (!scannedWarga) return;
        if (!inputDate) return showToast("Tanggal jimpitan belum dipilih!");
        
        const dateParts = inputDate.split('-');
        const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
        const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const monthStr = monthNames[dateObj.getMonth()];
        const yearStr = dateObj.getFullYear().toString();

        const newEntry = { 
          id: Date.now(), 
          tanggal: inputDate, 
          bulan: monthStr, 
          tahun: yearStr,
          jadwalId: selectedJadwalId || 'Tanpa Regu',
          wargaId: scannedWarga.id, 
          nominal: Number(nom) 
        };
        const updatedJimpitan = [newEntry, ...jimpitan];
        setJimpitan(updatedJimpitan);
        syncData("jimpitan", updatedJimpitan);
        setScannedWarga(null); 
        setManualId(''); 
        showToast('Setoran Rp 500 berhasil dicatat!');
      };

      return (
        <div className="space-y-6 animate-fade-in max-w-4xl mx-auto">
          <div className="text-center mb-6">
            <h2 className="text-2xl font-bold">Input & Scan Jimpitan</h2>
            <p className="text-gray-500 text-sm mt-2">Pilih tanggal dan scan barcode di kotak jimpitan rumah warga.</p>
          </div>
          
          <div className="mb-6 max-w-xs mx-auto">
            <label className="block text-sm font-semibold mb-2 text-center">Tanggal Jimpitan</label>
            <input 
              type="date" 
              className={`w-full p-3 rounded-lg border ${ui.input} text-center ${!isAdmin ? 'bg-gray-100 dark:bg-gray-800 opacity-80 cursor-not-allowed' : ''}`} 
              value={inputDate} 
              min={!isAdmin ? getLocalToday() : undefined}
              max={!isAdmin ? getLocalToday() : undefined}
              readOnly={!isAdmin}
              onChange={e => {
                if (!isAdmin) {
                  showToast("Koordinator tidak dapat mengubah tanggal.");
                  return;
                }
                setInputDate(e.target.value);
              }} 
            />
            {availableJadwalForDate.length === 0 && inputDate ? (
              <p className="text-xs text-red-500 mt-2 text-center bg-red-100 dark:bg-red-900/30 p-2 rounded">
                Tidak ada regu yang dijadwalkan pada hari ini.
              </p>
            ) : availableJadwalForDate.length > 0 ? (
              <p className="text-xs text-emerald-600 dark:text-emerald-400 mt-2 text-center font-bold bg-emerald-100 dark:bg-emerald-900/30 p-2 rounded">
                Regu Bertugas: Hari {availableJadwalForDate[0].hari}
              </p>
            ) : null}
          </div>

          {!scannedWarga && (
            <div className="bg-gray-900 rounded-xl overflow-hidden shadow-xl text-center border border-gray-800 p-6 py-10 max-w-xl mx-auto">
              
              {isCameraActive ? (
                <div className="relative mx-auto w-full">
                  <div dangerouslySetInnerHTML={{ __html: '<div id="qr-reader" style="width: 100%; min-height: 250px; background: black; border-radius: 0.5rem; overflow: hidden; margin: 0 auto;"></div>' }} />
                  <button onClick={stopCamera} className="absolute -top-4 -right-4 bg-red-600 text-white p-2 rounded-full z-50 shadow"><X size={20}/></button>
                  <div className="mt-4 text-white text-sm font-semibold">
                    Arahkan kamera ke Barcode Kotak Jimpitan.
                  </div>
                </div>
              ) : (
                <>
                  <Camera size={64} className="mx-auto text-blue-400 mb-4 opacity-50" />
                  <button onClick={startCamera} className={`${theme.main} hover:opacity-90 text-white px-6 py-4 rounded-lg font-bold transition flex items-center justify-center gap-2 mx-auto w-full sm:w-auto shadow-lg`}>
                    <Camera size={20} /> Buka Kamera Scanner
                  </button>
                </>
              )}

              <div className="bg-gray-800 p-4 rounded mt-8 mx-auto w-full">
                <p className="text-xs text-gray-400 mb-3 uppercase font-bold tracking-wider">Atau Ketik ID Manual</p>
                <form onSubmit={handleManualSubmit} className="flex flex-col sm:flex-row gap-2">
                  <input type="text" placeholder="Cth: H-02" className="flex-1 px-4 py-3 rounded bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-blue-500 uppercase font-mono text-center sm:text-left" value={manualId} onChange={e => setManualId(e.target.value)} required />
                  <button type="submit" className="bg-blue-600 text-white px-6 py-3 rounded font-bold w-full sm:w-auto">Cari ID</button>
                </form>
              </div>
            </div>
          )}

          {scannedWarga && (
            <div className={`${ui.card} p-6 rounded-xl border-t-4 border-t-emerald-500 animate-fade-in shadow-2xl max-w-sm mx-auto text-center`}>
              <div className="mb-6">
                <h3 className="text-2xl font-bold">{scannedWarga.nama}</h3>
                <p className="text-sm opacity-70 mt-1">ID Kotak: {scannedWarga.id}</p>
              </div>
              
              <button 
                type="button" 
                onClick={() => handleQuickSave(500)}
                className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black text-2xl py-6 rounded-xl shadow-xl flex flex-col items-center justify-center gap-2 transform transition hover:scale-105"
              >
                <CheckSquare size={32} />
                Rp 500
                <span className="text-sm font-semibold opacity-90 mt-1">Klik untuk Simpan Setoran</span>
              </button>
              
              <div className="mt-6 border-t border-gray-200 dark:border-gray-700 pt-4">
                <button type="button" onClick={() => setScannedWarga(null)} className="text-red-500 font-semibold px-4 py-2 hover:bg-red-50 rounded">Batal</button>
              </div>
            </div>
          )}

        </div>
      );
    };

    const RekapLaporan = ({ ctx }) => {
      const { warga, jimpitan, setJimpitan, absensi, setAbsensi, jadwal, settings, theme, ui, getWargaName, syncData, showToast, isAdmin, currentUser } = ctx;
      
      const [rekapTab, setRekapTab] = useState(isAdmin ? 'akumulasi' : 'harian'); 
      const [filterPeriode, setFilterPeriode] = useState('Semua');
      const [filterHari, setFilterHari] = useState('Semua');
      const [filterBulan, setFilterBulan] = useState('Semua');
      const [filterTahun, setFilterTahun] = useState('Semua');

      const periodeOptions = useMemo(() => ['Semua', ...new Set(jadwal.map(j => j.periode).filter(Boolean))], [jadwal]);
      const hariOptions = ['Semua', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu', 'Minggu'];
      const bulanOptions = ['Semua', 'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      const tahunOptions = ['Semua', '2025', '2026', '2027'];

      const [editModal, setEditModal] = useState(null); 
      const [editFormData, setEditFormData] = useState([]); 
      const [manualJimpitanEdit, setManualJimpitanEdit] = useState('');

      const activePeriod = useMemo(() => {
        if (settings.activePeriode) return settings.activePeriode;
        const allPeriods = [...new Set(jadwal.map(x => x.periode).filter(Boolean))];
        return allPeriods.length > 0 ? allPeriods[allPeriods.length - 1] : 'Semua';
      }, [jadwal, settings.activePeriode]);

      const appliedFilterPeriode = useMemo(() => {
        if (isAdmin) return filterPeriode;
        return activePeriod;
      }, [isAdmin, filterPeriode, activePeriod]);

      const filteredJimpitan = jimpitan.filter(j => {
        const matchBulan = filterBulan === 'Semua' || j.bulan === filterBulan;
        const matchTahun = filterTahun === 'Semua' || j.tahun === filterTahun;
        let matchPeriode = true;
        if (appliedFilterPeriode !== 'Semua') {
           const jw = jadwal.find(x => x.id === j.jadwalId);
           matchPeriode = jw && jw.periode === appliedFilterPeriode;
        }
        return matchBulan && matchTahun && matchPeriode;
      });

      const filteredAbsensi = absensi.filter(a => {
        const matchBulan = filterBulan === 'Semua' || a.bulan === filterBulan;
        const matchTahun = filterTahun === 'Semua' || a.tahun === filterTahun;
        let matchPeriode = true;
        if (appliedFilterPeriode !== 'Semua') {
           const jw = jadwal.find(x => x.id === a.jadwalId);
           matchPeriode = jw && jw.periode === appliedFilterPeriode;
        }
        return matchBulan && matchTahun && matchPeriode;
      });

      const rekapWarga = useMemo(() => {
        let filteredWargaIds = null;
        if (filterHari !== 'Semua' || appliedFilterPeriode !== 'Semua') {
           const matchingJadwal = jadwal.filter(j => 
               (filterHari === 'Semua' || j.hari.toLowerCase() === filterHari.toLowerCase()) &&
               (appliedFilterPeriode === 'Semua' || j.periode === appliedFilterPeriode)
           );
           filteredWargaIds = [];
           matchingJadwal.forEach(jw => {
               filteredWargaIds.push(jw.koordinatorId, ...jw.anggotaIds);
           });
        }

        return warga
          .filter(w => filteredWargaIds ? filteredWargaIds.includes(w.id) : true)
          .map(w => {
            const txJimpitan = filteredJimpitan.filter(t => t.wargaId === w.id);
            const txAbsen = filteredAbsensi.filter(t => t.wargaId === w.id);
            const alpaCount = txAbsen.filter(t => t.status === 'Alpa').length;
            return {
              ...w,
              totalJimpitan: txJimpitan.reduce((sum, t) => sum + (Number(t.nominal) || 0), 0),
              hadir: txAbsen.filter(t => t.status === 'Hadir').length,
              alpa: alpaCount,
              denda: alpaCount * (settings.nominalDenda || 0),
            };
          });
      }, [warga, filteredJimpitan, filteredAbsensi, settings.nominalDenda, filterHari, appliedFilterPeriode, jadwal]);

      const grandTotalJimpitan = filteredJimpitan.reduce((sum, j) => sum + (Number(j.nominal) || 0), 0);
      const grandTotalDenda = rekapWarga.reduce((sum, w) => sum + w.denda, 0);

      const rekapHarian = useMemo(() => {
        const harianMap = {};
        
        filteredJimpitan.forEach(t => {
          const key = `${t.tanggal}_${t.jadwalId || 'Tanpa Regu'}`;
          if (!harianMap[key]) {
            const dateParts = t.tanggal.split('-');
            const d = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            harianMap[key] = { tanggal: t.tanggal, hariInput: days[d.getDay()], jadwalId: t.jadwalId, total: 0, anggotaAlpa: [] };
          }
          harianMap[key].total += (Number(t.nominal) || 0);
        });

        filteredAbsensi.forEach(a => {
           if (a.status !== 'Hadir') {
              const key = `${a.tanggal}_${a.jadwalId || 'Tanpa Regu'}`;
              if (!harianMap[key]) {
                const dateParts = a.tanggal.split('-');
                const d = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
                const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
                harianMap[key] = { tanggal: a.tanggal, hariInput: days[d.getDay()], jadwalId: a.jadwalId, total: 0, anggotaAlpa: [] };
              }
              harianMap[key].anggotaAlpa.push({ nama: getWargaName(a.wargaId), status: a.status });
           }
        });
        
        return Object.values(harianMap)
          .filter(r => filterHari === 'Semua' || (r.hariInput && r.hariInput.toLowerCase() === filterHari.toLowerCase()))
          .sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
      }, [filteredJimpitan, filteredAbsensi, getWargaName, filterHari]);

      const handlePrint = () => window.print();

      const handleExportExcel = () => {
        let csvContent = "";
        if (rekapTab === 'akumulasi') {
          csvContent += "Nama Warga,Hadir Ronda,Alpa,Tunggakan Denda,Total Jimpitan\n";
          rekapWarga.forEach(r => {
            csvContent += `"${r.nama}",${r.hadir},${r.alpa},${r.denda},${r.totalJimpitan}\n`;
          });
          csvContent += `Total Keseluruhan,,,,,Rp ${grandTotalDenda},Rp ${filterHari === 'Semua' ? grandTotalJimpitan : 0}\n`;
        } else {
          csvContent += "Tanggal Input,Regu Bertugas,Kehadiran,Total Pemasukan\n";
          rekapHarian.forEach(r => {
            const jw = jadwal.find(x => x.id === r.jadwalId);
            const regu = jw ? `Regu Hari ${jw.hari}` : "Tanpa Regu Terjadwal";
            let kehadiran = r.anggotaAlpa.length > 0 
              ? r.anggotaAlpa.map(a => `[${a.status}] ${a.nama}`).join(" | ") 
              : "Hadir Semua";
            csvContent += `"${r.tanggal}","${regu}","${kehadiran}",${r.total}\n`;
          });
          const totalPemasukanHarian = rekapHarian.filter(r => isAdmin || (currentUser?.role === 'Koordinator' && jadwal.find(j=>j.id===r.jadwalId)?.koordinatorId === currentUser.wargaId)).reduce((sum, r) => sum + r.total, 0);
          csvContent += `Total Pemasukan Harian,,,,${totalPemasukanHarian}\n`;
        }
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `Rekap_Keuangan_${rekapTab}_${appliedFilterPeriode}_${filterBulan}_${filterTahun}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleOpenEditModal = (tanggal, jadwalId) => {
        const jw = jadwal.find(x => x.id === jadwalId);
        const reguMembers = jw ? [jw.koordinatorId, ...jw.anggotaIds] : [];

        const existingManualJimpitan = jimpitan.find(j => j.tanggal === tanggal && j.jadwalId === jadwalId && j.wargaId === 'KAS-UMUM');
        setManualJimpitanEdit(existingManualJimpitan ? existingManualJimpitan.nominal : '');

        const formData = warga.map(w => {
           const existingJimpitan = jimpitan.find(j => j.tanggal === tanggal && j.jadwalId === jadwalId && j.wargaId === w.id);
           const existingAbsen = absensi.find(a => a.tanggal === tanggal && a.jadwalId === jadwalId && a.wargaId === w.id);
           const isMember = reguMembers.includes(w.id);

           return {
             wargaId: w.id,
             nama: w.nama,
             nominal: existingJimpitan ? existingJimpitan.nominal : '',
             isMember: isMember,
             status: isMember ? (existingAbsen ? existingAbsen.status : 'Hadir') : null,
             keterangan: existingAbsen ? existingAbsen.keterangan : ''
           };
        });
        setEditFormData(formData);
        setEditModal({ tanggal, jadwalId });
      };

      const handleSaveEdit = (e) => {
        e.preventDefault();
        const { tanggal, jadwalId } = editModal;
        
        const dateParts = tanggal.split('-');
        const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
        const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const monthStr = monthNames[dateObj.getMonth()];
