        const yearStr = dateObj.getFullYear().toString();

        const newJimpitan = jimpitan.filter(j => !(j.tanggal === tanggal && j.jadwalId === jadwalId));
        const newAbsensi = absensi.filter(a => !(a.tanggal === tanggal && a.jadwalId === jadwalId));
        
        const editedJimpitan = [];
        const editedAbsensi = [];
        
        editFormData.forEach(d => {
           if (d.nominal && Number(d.nominal) > 0 || d.nominal === '0') {
             editedJimpitan.push({
                id: Date.now() + Math.random(),
                tanggal, bulan: monthStr, tahun: yearStr,
                jadwalId, wargaId: d.wargaId, nominal: Number(d.nominal)
             });
           }
           if (d.isMember) {
             editedAbsensi.push({
                id: Date.now() + Math.random(),
                tanggal, bulan: monthStr, tahun: yearStr,
                jadwalId, wargaId: d.wargaId, status: d.status, keterangan: d.keterangan
             });
           }
        });

        if (manualJimpitanEdit !== '' && Number(manualJimpitanEdit) >= 0 && isAdmin) {
            editedJimpitan.push({
                id: Date.now() + Math.random(),
                tanggal, bulan: monthStr, tahun: yearStr,
                jadwalId, wargaId: 'KAS-UMUM', nominal: Number(manualJimpitanEdit)
            });
        }
        
        const finalJimpitan = [...editedJimpitan, ...newJimpitan];
        const finalAbsensi = [...editedAbsensi, ...newAbsensi];
        
        setJimpitan(finalJimpitan);
        setAbsensi(finalAbsensi);
        syncData("jimpitan", finalJimpitan);
        syncData("absensi", finalAbsensi);
        
        setEditModal(null);
        showToast(`Perubahan laporan tanggal ${tanggal} berhasil disimpan!`);
      };

      const handleHapusLaporan = () => {
        if(window.confirm("Yakin ingin menghapus seluruh laporan (Absen & Jimpitan) pada tanggal dan regu ini?")) {
            const newJimpitan = jimpitan.filter(j => !(j.tanggal === editModal.tanggal && j.jadwalId === editModal.jadwalId));
            const newAbsensi = absensi.filter(a => !(a.tanggal === editModal.tanggal && a.jadwalId === editModal.jadwalId));
            
            setJimpitan(newJimpitan);
            setAbsensi(newAbsensi);
            syncData("jimpitan", newJimpitan);
            syncData("absensi", newAbsensi);
            
            setEditModal(null);
            showToast("Laporan berhasil dihapus secara total.");
        }
      };

      return (
        <div className="space-y-6 animate-fade-in print-content" id="laporan-pdf">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 print-hide">
            <div>
              <h2 className="text-2xl font-bold">Rekap Laporan Keuangan</h2>
              <p className="text-sm opacity-70 mt-1">Gunakan PDF Print untuk mencetak.</p>
            </div>
            <div className="flex flex-wrap gap-2 w-full md:w-auto">
              {isAdmin && (
                <select className={`p-2 rounded border ${ui.input} text-sm flex-1 min-w-[120px]`} value={filterPeriode} onChange={e => setFilterPeriode(e.target.value)}>
                  {periodeOptions.map(p => <option key={p} value={p}>{p === 'Semua' ? 'Semua Periode' : `Periode: ${p}`}</option>)}
                </select>
              )}
              <select className={`p-2 rounded border ${ui.input} text-sm flex-1 min-w-[120px]`} value={filterHari} onChange={e => setFilterHari(e.target.value)}>
                {hariOptions.map(h => <option key={h} value={h}>{h === 'Semua' ? 'Semua Hari/Regu' : `Regu Hari ${h}`}</option>)}
              </select>
              <select className={`p-2 rounded border ${ui.input} text-sm flex-1 min-w-[100px]`} value={filterBulan} onChange={e => setFilterBulan(e.target.value)}>
                {bulanOptions.map(b => <option key={b} value={b}>{b === 'Semua' ? 'Semua Bulan' : b}</option>)}
              </select>
              <select className={`p-2 rounded border ${ui.input} text-sm flex-1 min-w-[100px]`} value={filterTahun} onChange={e => setFilterTahun(e.target.value)}>
                {tahunOptions.map(t => <option key={t} value={t}>{t === 'Semua' ? 'Semua Tahun' : t}</option>)}
              </select>
              <button onClick={handleExportExcel} className={`bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 whitespace-nowrap`}>
                <FileDown size={18} /> Excel
              </button>
              <button onClick={handlePrint} className={`${theme.main} text-white px-4 py-2 rounded shadow flex items-center gap-2 whitespace-nowrap`}>
                <FileDown size={18} /> Cetak
              </button>
            </div>
          </div>
          
          <div className="hidden print:block text-center mb-8 border-b-2 border-black pb-4 text-black">
            <h1 className="text-3xl font-bold uppercase tracking-wider">Laporan Transparansi Keuangan</h1>
            <p className="text-lg mt-1">{settings.webName}</p>
            <p className="text-sm mt-1">Periode: {appliedFilterPeriode !== 'Semua' ? appliedFilterPeriode : 'Semua Periode'} | {filterBulan !== 'Semua' ? filterBulan : 'Semua Bulan'} {filterTahun !== 'Semua' ? filterTahun : ''}</p>
          </div>

          {isAdmin && (
            <div className="flex bg-gray-200 dark:bg-gray-700 p-1 rounded-lg w-max print-hide">
              <button onClick={() => setRekapTab('akumulasi')} className={`px-4 py-2 rounded-md text-sm font-semibold transition ${rekapTab === 'akumulasi' ? 'bg-white shadow dark:bg-gray-800 dark:text-white' : 'text-gray-600 dark:text-gray-300'}`}>Akumulasi Per Warga</button>
              <button onClick={() => setRekapTab('harian')} className={`px-4 py-2 rounded-md text-sm font-semibold transition ${rekapTab === 'harian' ? 'bg-white shadow dark:bg-gray-800 dark:text-white' : 'text-gray-600 dark:text-gray-300'}`}>Laporan Harian (Per Regu)</button>
            </div>
          )}

          <div className={`${ui.card} rounded-xl overflow-hidden print:shadow-none print:border-black`}>
            
            {rekapTab === 'akumulasi' ? (
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse print:text-black print:border-black print:border">
                  <thead>
                    <tr className={`${ui.tableHead} border-b text-sm print:bg-gray-100`}>
                      <th className="p-4 print:border-black print:border">Nama Warga</th>
                      <th className="p-4 text-center print:border-black print:border">Hadir</th>
                      <th className="p-4 text-center text-red-500 font-bold print:text-black print:border-black print:border">Alpa</th>
                      <th className="p-4 text-right text-red-600 font-bold print:text-black print:border-black print:border">Denda</th>
                      <th className="p-4 text-right text-emerald-600 font-bold print:text-black print:border-black print:border">Total Jimpitan</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rekapWarga.map((r, i) => (
                      <tr key={i} className={`border-b ${ui.tableRow} print:border-black`}>
                        <td className="p-4 print:border-black print:border font-semibold flex items-center gap-2">
                           <UserCircle size={16} className="text-gray-400 print-hide" /> {r.nama}
                        </td>
                        <td className="p-4 text-center print:border-black print:border">{r.hadir}x</td>
                        <td className="p-4 text-center text-red-500 font-bold print:text-black print:border-black print:border">{r.alpa}x</td>
                        <td className="p-4 text-right text-red-600 font-bold print:text-black print:border-black print:border">{r.denda > 0 ? `Rp ${r.denda.toLocaleString('id-ID')}` : '-'}</td>
                        <td className="p-4 text-right font-bold text-emerald-600 print:text-black print:border-black print:border">Rp {r.totalJimpitan.toLocaleString('id-ID')}</td>
                      </tr>
                    ))}
                    <tr className="bg-gray-100 dark:bg-gray-800 font-bold text-sm print:bg-gray-200">
                      <td colSpan="3" className="p-4 text-right uppercase print:border-black print:border">Total Keseluruhan:</td>
                      <td className="p-4 text-right text-red-600 print:text-black print:border-black print:border">Rp {grandTotalDenda.toLocaleString('id-ID')}</td>
                      <td className="p-4 text-right text-emerald-600 print:text-black print:border-black print:border">
                        {filterHari === 'Semua' ? `Rp ${grandTotalJimpitan.toLocaleString('id-ID')}` : '-'}
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse print:text-black print:border-black print:border">
                  <thead>
                    <tr className={`${ui.tableHead} border-b text-sm print:bg-gray-100`}>
                      <th className="p-4 print:border-black print:border">Tanggal Input</th>
                      <th className="p-4 print:border-black print:border">Regu Bertugas</th>
                      <th className="p-4 print:border-black print:border min-w-[200px]">Transparansi Kehadiran & Denda</th>
                      <th className="p-4 text-right text-emerald-600 font-bold print:text-black print:border-black print:border">Total Pemasukan</th>
                      <th className="p-4 text-center print-hide">Aksi (Edit)</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rekapHarian.length === 0 && (
                      <tr><td colSpan="5" className="p-4 text-center text-gray-500 italic">Belum ada data pemasukan/absensi pada periode ini.</td></tr>
                    )}
                    {rekapHarian.map((r, i) => {
                      const jw = jadwal.find(x => x.id === r.jadwalId);
                      
                      const isMyRegu = currentUser?.role === 'Koordinator' && jadwal.filter(j => j.koordinatorId === currentUser.wargaId).map(j=>j.id).includes(r.jadwalId);
                      if (!isAdmin && !isMyRegu && currentUser?.role === 'Koordinator') return null;
                      const canEdit = isAdmin || isMyRegu;

                      return (
                        <tr key={i} className={`border-b ${ui.tableRow} print:border-black`}>
                          <td className="p-4 print:border-black print:border font-semibold whitespace-nowrap">
                            {r.tanggal} <span className="text-xs font-normal text-gray-500 ml-1">({r.hariInput})</span>
                          </td>
                          <td className="p-4 print:border-black print:border">
                            {jw ? `Regu Hari ${jw.hari}` : <span className="italic text-gray-400">Tanpa Regu Terjadwal</span>}
                            {jw && <div className="text-[10px] uppercase text-gray-500 mt-1">Koord: {getWargaName(jw.koordinatorId)}</div>}
                          </td>
                          <td className="p-4 print:border-black print:border">
                            {r.anggotaAlpa.length > 0 ? (
                              <ul className="text-xs space-y-1">
                                {r.anggotaAlpa.map((a, idx) => (
                                  <li key={idx} className="flex flex-col sm:flex-row sm:items-center gap-1">
                                    <div><span className={a.status === 'Alpa' ? 'text-red-500 font-bold' : 'text-orange-500'}>[{a.status}]</span> {a.nama}</div>
                                    {a.status === 'Alpa' && <span className="text-[10px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded ml-1">Denda: Rp {(settings.nominalDenda || 0).toLocaleString('id-ID')}</span>}
                                  </li>
                                ))}
                              </ul>
                            ) : (
                              <span className="text-xs text-emerald-600 font-bold">Hadir Semua</span>
                            )}
                          </td>
                          <td className="p-4 text-right font-bold text-emerald-600 print:text-black print:border-black print:border">
                            Rp {r.total.toLocaleString('id-ID')}
                          </td>
                          <td className="p-4 text-center print-hide">
                            {canEdit ? (
                              <button onClick={() => handleOpenEditModal(r.tanggal, r.jadwalId)} className={`${theme.light} ${theme.text} hover:opacity-80 p-2 rounded-lg text-xs font-bold transition flex items-center justify-center gap-1 mx-auto`}>
                                <Edit size={14} /> Edit
                              </button>
                            ) : (
                              <span className="text-xs text-gray-400">-</span>
                            )}
                          </td>
                        </tr>
                      )
                    })}
                    {rekapHarian.length > 0 && (
                      <tr className="bg-gray-100 dark:bg-gray-800 font-bold text-sm print:bg-gray-200">
                        <td colSpan="3" className="p-4 text-right uppercase print:border-black print:border">Total Pemasukan Harian:</td>
                        <td className="p-4 text-right text-emerald-600 print:text-black print:border-black print:border">
                          Rp {rekapHarian.filter(r => isAdmin || (currentUser?.role === 'Koordinator' && jadwal.find(j=>j.id===r.jadwalId)?.koordinatorId === currentUser.wargaId)).reduce((sum, r) => sum + r.total, 0).toLocaleString('id-ID')}
                        </td>
                        <td className="print-hide"></td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* --- MODAL EDIT LAPORAN HARIAN --- */}
          {editModal && (
            <div className="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4 animate-fade-in print-hide">
               <div className={`${ui.card} w-full max-w-4xl rounded-xl shadow-2xl flex flex-col max-h-[90vh]`}>
                  <div className="p-5 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50 rounded-t-xl">
                     <div>
                       <h3 className="font-bold text-lg">Edit Laporan Harian</h3>
                       <p className="text-sm opacity-70">Tanggal: {editModal.tanggal} | Regu: {jadwal.find(j => j.id === editModal.jadwalId)?.hari || editModal.jadwalId}</p>
                     </div>
                     <button onClick={() => setEditModal(null)} className="text-gray-500 hover:text-red-500 bg-gray-200 dark:bg-gray-700 p-2 rounded-full"><X size={20} /></button>
                  </div>
                  
                  <div className="p-5 overflow-y-auto flex-1">
                    
                    {isAdmin && (
                      <div className="mb-6 p-4 bg-gray-100 dark:bg-gray-700 rounded-lg border border-gray-200 dark:border-gray-600">
                        <label className="block text-sm font-semibold mb-2">Total Jimpitan Regu Kumulatif (Input Manual Tanpa Scan)</label>
                        <input 
                          type="number" 
                          className={`w-full p-3 rounded-lg border ${ui.input} text-lg font-bold`} 
                          value={manualJimpitanEdit} 
                          placeholder="Contoh: 7000"
                          onChange={(e) => setManualJimpitanEdit(e.target.value)} 
                        />
                      </div>
                    )}

                    <p className="text-sm text-gray-500 mb-4">Ubah nominal jimpitan scan satu-per-satu atau status kehadiran regu secara manual untuk memperbaiki kesalahan input pada hari tersebut.</p>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left border-collapse min-w-[500px]">
                        <thead>
                          <tr className={`${ui.tableHead} border-b text-sm`}>
                            <th className="p-3">Nama Warga</th>
                            <th className="p-3 w-40">Uang Jimpitan (Rp)</th>
                            <th className="p-3 w-48">Absen (Anggota Regu)</th>
                          </tr>
                        </thead>
                        <tbody>
                          {editFormData.map((data, idx) => (
                            <tr key={data.wargaId} className={`border-b ${ui.tableRow}`}>
                              <td className="p-3 font-medium text-sm flex items-center gap-2">
                                {data.nama} 
                                {data.isMember && <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded uppercase">Regu</span>}
                              </td>
                              <td className="p-3">
                                <input 
                                  type="number" 
                                  className={`w-full p-2 rounded border ${ui.input} text-sm`} 
                                  value={data.nominal} 
                                  placeholder="0"
                                  onChange={(e) => {
                                    const newData = [...editFormData];
                                    newData[idx].nominal = e.target.value;
                                    setEditFormData(newData);
                                  }} 
                                />
                              </td>
                              <td className="p-3">
                                {data.isMember ? (
                                  <select 
                                    className={`w-full p-2 rounded border ${ui.input} text-sm ${data.status === 'Alpa' ? 'text-red-500 font-bold' : ''}`}
                                    value={data.status || ''}
                                    onChange={(e) => {
                                      const newData = [...editFormData];
                                      newData[idx].status = e.target.value;
                                      setEditFormData(newData);
                                    }}
                                  >
                                    <option value="Hadir">Hadir</option>
                                    <option value="Sakit">Sakit</option>
                                    <option value="Izin">Izin</option>
                                    <option value="Kerja">Kerja</option>
                                    <option value="Alpa" className="text-red-500 font-bold">Alpa</option>
                                  </select>
                                ) : (
                                  <span className="text-xs text-gray-400 italic">Bukan Anggota Regu</span>
                                )}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                  
                  <div className="p-5 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 flex flex-col sm:flex-row justify-between gap-3 rounded-b-xl items-center">
                     <button type="button" onClick={handleHapusLaporan} className="w-full sm:w-auto px-6 py-2.5 rounded-lg font-bold text-red-600 bg-red-100 hover:bg-red-200 transition flex items-center justify-center gap-2">
                        <Trash2 size={18} /> Hapus Total
                     </button>
                     
                     <div className="flex gap-2 w-full sm:w-auto">
                       <button onClick={() => setEditModal(null)} className="w-full sm:w-auto px-6 py-2.5 rounded-lg font-bold text-gray-600 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-300 transition">Batal</button>
                       <button onClick={handleSaveEdit} className={`w-full sm:w-auto ${theme.main} text-white px-6 py-2.5 rounded-lg font-bold hover:opacity-90 flex items-center justify-center gap-2 transition`}>
                         <CheckCircle size={20} /> Simpan
                       </button>
                     </div>
                  </div>
               </div>
            </div>
          )}

        </div>
      );
    };

    const Pengaturan = ({ ctx }) => {
      const { isAdmin, currentUser, setCurrentUser, accounts, setAccounts, settings, setSettings, warga, syncData, showToast, themeColor, setThemeColor, isDarkMode, setIsDarkMode, theme, ui, jadwal } = ctx;
      
      const [oldPassword, setOldPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [showAddAccountForm, setShowAddAccountForm] = useState(false);
      const [newAccount, setNewAccount] = useState({ username: '', password: '', role: 'Koordinator', nama: '', wargaId: '' });

      const handleSaveSettings = () => {
        syncData("settings", settings);
        showToast('Pengaturan website berhasil disimpan!');
      }

      const handleGantiPassword = (e) => {
        e.preventDefault();
        if (oldPassword !== currentUser.password) { showToast('Gagal: Password lama salah!'); return; }
        if (newPassword !== confirmPassword) { showToast('Gagal: Password tidak cocok!'); return; }
        const updatedAccounts = accounts.map(a => a.id === currentUser.id ? { ...a, password: newPassword } : a);
        setAccounts(updatedAccounts); 
        syncData("accounts", updatedAccounts); 
        setCurrentUser({ ...currentUser, password: newPassword });
        setOldPassword(''); 
        setNewPassword(''); 
        setConfirmPassword(''); 
        showToast('Berhasil: Password diubah!');
      };

      const handleAddAccount = (e) => {
        e.preventDefault();
        if (accounts.some(a => a.username.toLowerCase() === newAccount.username.toLowerCase())) return showToast('Gagal: Username digunakan!');
        const newId = accounts.length > 0 ? Math.max(...accounts.map(a => a.id)) + 1 : 1;
        const updatedAccounts = [...accounts, { id: newId, ...newAccount }];
        setAccounts(updatedAccounts); 
        syncData("accounts", updatedAccounts);
        setShowAddAccountForm(false); 
        setNewAccount({ username: '', password: '', role: 'Koordinator', nama: '', wargaId: '' });
        showToast('Akun baru berhasil ditambahkan!');
      };

      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!['image/jpeg', 'image/jpg', 'image/png'].includes(file.type)) {
          alert('Hanya format gambar JPG dan PNG yang diperbolehkan.');
          return;
        }
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 300; 
            let width = img.width; let height = img.height;
            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
            canvas.width = width; canvas.height = height;
            const ctxCanvas = canvas.getContext('2d');
            ctxCanvas.fillStyle = "white";
            ctxCanvas.fillRect(0, 0, canvas.width, canvas.height);
            ctxCanvas.drawImage(img, 0, 0, width, height);
            
            setSettings(prev => ({...prev, logoUrl: canvas.toDataURL('image/jpeg', 0.8)}));
          }
          img.src = event.target.result;
        }
        reader.readAsDataURL(file);
      };

      return (
        <div className="space-y-8 animate-fade-in max-w-4xl pb-10">
          <h2 className="text-2xl font-bold">Pengaturan {isAdmin ? 'Web & Akun' : 'Akun'}</h2>
          
          {isAdmin && (
            <>
              <div className={`${ui.card} rounded-xl overflow-hidden`}>
                <div className="p-5 border-b border-gray-200 dark:border-gray-700 flex items-center gap-3">
                  <Settings className={theme.text} />
                  <h3 className="font-bold text-lg">Konfigurasi Identitas & Nominal</h3>
                </div>
                
                <div className="p-6 flex flex-col md:flex-row gap-8">
                  <div className="md:w-1/3 flex flex-col">
                    <label className="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Logo Website</label>
                    <div className="flex-1 min-h-[160px] border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-2 relative flex flex-col items-center justify-center group overflow-hidden bg-gray-50 dark:bg-gray-800 transition-colors hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer">
                      {settings.logoUrl ? (
                        <>
                          <img src={settings.logoUrl} alt="Logo" className="w-full h-full object-contain p-2 drop-shadow-sm" />
                          <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <span className="text-white text-xs font-bold px-3 py-1 bg-black/50 rounded-full">Ganti Logo</span>
                          </div>
                        </>
                      ) : (
                        <>
                          <ImageIcon size={40} className="text-gray-400 mb-2" />
                          <span className="text-xs text-gray-500 font-medium mt-1">Format JPG/PNG</span>
                        </>
                      )}
                      <input type="file" accept=".jpg,.jpeg,.png" className="absolute inset-0 opacity-0 cursor-pointer z-10" onClick={(e) => e.target.value = null} onChange={handleLogoUpload} />
                      
                      {settings.logoUrl && (
                        <button type="button" onClick={(e)=>{e.preventDefault(); setSettings({...settings, logoUrl: null})}} className="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1.5 z-20 hover:bg-red-600 shadow-md transition-transform hover:scale-110" title="Hapus Logo">
                          <X size={14}/>
                        </button>
                      )}
                    </div>
                  </div>
                  
                  <div className="md:w-2/3 flex flex-col gap-5 justify-center">
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                      <div>
                        <label className="block text-sm font-semibold mb-1.5 text-gray-700 dark:text-gray-300">Nama Website</label>
                        <input type="text" className={`w-full p-3 rounded-lg border ${ui.input} transition-shadow`} value={settings.webName || ''} onChange={e => setSettings({...settings, webName: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-1.5 text-gray-700 dark:text-gray-300">Nominal Denda Alpa (Rp)</label>
                        <input type="number" className={`w-full p-3 rounded-lg border ${ui.input} transition-shadow`} value={settings.nominalDenda || ''} onChange={e => setSettings({...settings, nominalDenda: Number(e.target.value)})} />
                      </div>
                    </div>
                    <div className="w-full">
                      <label className="block text-sm font-semibold mb-1.5 text-gray-700 dark:text-gray-300">Tagline / Deskripsi Singkat</label>
                      <textarea
                        rows="3"
                        className={`w-full p-3 rounded-lg border resize-y ${ui.input} transition-shadow`}
                        value={settings.tagline || ''}
                        onChange={e => setSettings({...settings, tagline: e.target.value})}
                        placeholder="Contoh: Sistem Keamanan & Keuangan Warga"
                      ></textarea>
                      <p className="text-xs text-gray-500 dark:text-gray-400 mt-1.5">Teks ini akan ditampilkan di bawah judul pada halaman utama / portal warga.</p>
                    </div>
                  </div>
                </div>

                <div className="p-4 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 flex justify-end">
                  <button onClick={handleSaveSettings} className={`${theme.main} text-white px-6 py-2.5 rounded-lg font-bold w-full md:w-auto shadow-md hover:opacity-90 transition`}>
                    Simpan Web Settings
                  </button>
                </div>
              </div>

              <div className={`${ui.card} rounded-xl overflow-hidden`}>
                <div className="p-5 border-b flex justify-between items-center border-gray-200 dark:border-gray-700">
                  <div className="flex items-center gap-3">
                    <UserPlus className={theme.text} />
                    <h3 className="font-bold text-lg">Manajemen Akun</h3>
                  </div>
                  <button onClick={() => setShowAddAccountForm(!showAddAccountForm)} className={`${theme.main} text-white px-3 py-1.5 rounded text-sm font-semibold flex gap-2 items-center`}>
                    {showAddAccountForm ? <X size={16}/> : <Plus size={16}/>} {showAddAccountForm ? 'Batal' : 'Tambah Akun'}
                  </button>
                </div>
                
                {showAddAccountForm && (
                  <form onSubmit={handleAddAccount} className="p-5 border-b border-gray-200 dark:border-gray-700">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-semibold mb-1">Username</label>
                        <input required type="text" className={`w-full p-2.5 rounded-lg border ${ui.input}`} value={newAccount.username} onChange={e => setNewAccount({...newAccount, username: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-1">Password</label>
                        <input required type="text" className={`w-full p-2.5 rounded-lg border ${ui.input}`} value={newAccount.password} onChange={e => setNewAccount({...newAccount, password: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-1">Nama Pemilik Akun</label>
                        <input required type="text" className={`w-full p-2.5 rounded-lg border ${ui.input}`} value={newAccount.nama} onChange={e => setNewAccount({...newAccount, nama: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-1">Role Akses</label>
                        <select className={`w-full p-2.5 rounded-lg border ${ui.input}`} value={newAccount.role} onChange={e => setNewAccount({...newAccount, role: e.target.value, wargaId: ''})}>
                          <option value="Koordinator">Koordinator Regu</option>
                          <option value="Admin Jimpitan">Admin Jimpitan</option>
                        </select>
                      </div>
                      {newAccount.role === 'Koordinator' && (
                        <div className="md:col-span-2">
                          <label className="block text-sm font-semibold mb-1">Tautkan ke Data Warga</label>
                          <select required className={`w-full p-2.5 rounded-lg border ${ui.input}`} value={newAccount.wargaId} onChange={e => setNewAccount({...newAccount, wargaId: e.target.value})}>
                            <option value="">-- Pilih Warga --</option>
                            {warga.map(w => <option key={w.id} value={w.id}>{w.id} - {w.nama}</option>)}
                          </select>
                        </div>
                      )}
                    </div>
                    <button type="submit" className={`mt-4 px-6 py-2.5 rounded-lg text-sm font-bold text-white w-full md:w-auto shadow ${theme.main}`}>Simpan Akun Baru</button>
                  </form>
                )}
                
                <div className="overflow-x-auto">
                  <table className="w-full text-left">
                    <thead>
                      <tr className={`${ui.tableHead} border-b text-sm`}>
                        <th className="p-4">Username & Role</th>
                        <th className="p-4">Keterangan / Jadwal Terkait</th>
                        <th className="p-4 text-center">Aksi</th>
                      </tr>
                    </thead>
                    <tbody>
                      {accounts.map(acc => {
                        const isKoordinator = jadwal.filter(j => j.koordinatorId === acc.wargaId).map(j => j.hari);
                        const isAnggota = jadwal.filter(j => j.anggotaIds.includes(acc.wargaId)).map(j => j.hari);
                        return (
                          <tr key={acc.id} className={`border-b ${ui.tableRow}`}>
                            <td className="p-4">
                              <div className="font-bold text-sm">{acc.username}</div>
                              <span className={`inline-block mt-1 px-2 py-0.5 text-[10px] font-bold rounded-sm ${acc.role === 'Admin Jimpitan' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`}>
                                {acc.role}
                              </span>
                            </td>
                            <td className="p-4 text-sm text-gray-500 dark:text-gray-400">
                              {acc.role === 'Admin Jimpitan' ? (
                                <span className="font-semibold text-gray-800 dark:text-gray-200">Akses Penuh (Superadmin)</span>
                              ) : (
                                <div className="flex flex-col gap-1">
                                  {isKoordinator.length > 0 && <span className="text-emerald-600 dark:text-emerald-400 font-semibold">Koordinator: Hari {isKoordinator.join(', ')}</span>}
                                  {isAnggota.length > 0 && <span>Anggota: Hari {isAnggota.join(', ')}</span>}
                                </div>
                              )}
                            </td>
                            <td className="p-4 text-center">
                              <button onClick={() => { if(acc.id !== currentUser.id) { const ud = accounts.filter(a=>a.id!==acc.id); setAccounts(ud); syncData("accounts", ud); } else { showToast('Gagal: Tidak bisa menghapus akun sendiri'); } }} className="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 p-2 rounded-full transition">
                                <Trash2 size={16} />
                              </button>
                            </td>
                          </tr>
                        )
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </>
          )}

          <div className={`${ui.card} rounded-xl overflow-hidden`}>
            <div className="p-5 border-b border-gray-200 dark:border-gray-700 flex items-center gap-3"><KeyRound className={theme.text} /><h3 className="font-bold text-lg">Ubah Password Akun</h3></div>
            <form onSubmit={handleGantiPassword} className="p-6 grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
              <div>
                <label className="block text-sm font-semibold mb-1.5">Password Lama</label>
                <input type="password" required className={`w-full p-3 rounded-lg border ${ui.input}`} value={oldPassword} onChange={e => setOldPassword(e.target.value)} />
              </div>
              <div>
                <label className="block text-sm font-semibold mb-1.5">Password Baru</label>
                <input type="password" required className={`w-full p-3 rounded-lg border ${ui.input}`} value={newPassword} onChange={e => setNewPassword(e.target.value)} />
              </div>
              <div>
                <label className="block text-sm font-semibold mb-1.5">Konfirmasi</label>
                <input type="password" required className={`w-full p-3 rounded-lg border ${ui.input}`} value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} />
              </div>
              <div className="md:col-span-3">
                <button type="submit" className={`${theme.main} text-white px-6 py-3 rounded-lg font-bold w-full md:w-auto shadow hover:opacity-90 transition`}>Simpan Password Baru</button>
              </div>
            </form>
          </div>
          
          <div className={`${ui.card} rounded-xl overflow-hidden`}>
            <div className="p-5 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 flex items-center gap-3">
              <Palette className={theme.text} />
              <h3 className="font-bold text-lg">Personalisasi Tampilan</h3>
            </div>
            <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
              <div>
                <label className="block text-sm font-semibold mb-3">Mode Gelap / Terang</label>
                <div className="flex bg-gray-100 dark:bg-gray-700 p-1 rounded-lg w-max">
                  <button onClick={() => setIsDarkMode(false)} className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold transition ${!isDarkMode ? 'bg-white shadow text-gray-900' : 'text-gray-500'}`}><Sun size={16} /> Light</button>
                  <button onClick={() => setIsDarkMode(true)} className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold transition ${isDarkMode ? 'bg-gray-800 shadow text-white' : 'text-gray-500'}`}><Moon size={16} /> Dark</button>
                </div>
              </div>
              <div>
                <label className="block text-sm font-semibold mb-3">Warna Aksen Aplikasi</label>
                <div className="flex gap-4">
                  {Object.keys(colorPalettes).map(color => (
                    <button key={color} onClick={() => setThemeColor(color)} className={`w-10 h-10 rounded-full border-4 transition-transform ${themeColor === color ? 'border-gray-300 dark:border-gray-500 scale-110 shadow-lg' : 'border-transparent hover:scale-105'}`} style={{ backgroundColor: color === 'blue' ? '#2563EB' : color === 'emerald' ? '#10B981' : '#7C3AED' }} />
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const BarcodeGenerator = ({ ctx }) => {
      const { warga, theme, ui } = ctx;
      const handlePrint = () => window.print();

      return (
        <div className="space-y-6 animate-fade-in print-content">
          <h2 className="text-2xl font-bold print-hide">Generate Barcode Rumah</h2>
          <button onClick={handlePrint} className={`${theme.main} text-white px-4 py-2 rounded print-hide`}>Cetak Barcode</button>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-6 print:block">
            {warga.map(w => (
              <div key={w.id} className={`${ui.card} p-4 rounded-xl text-center print:inline-block print:w-[22%] print:m-[1%] print:border-black print:border print:shadow-none break-inside-avoid`}>
                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${w.id}`} alt="QR" className="w-32 h-32 mx-auto mb-2" />
                <h3 className="font-bold print:text-xs">{w.nama}</h3>
                <p className="text-sm font-mono mt-1 print:text-[10px]">{w.id}</p>
              </div>
            ))}
          </div>
        </div>
      );
    };

    function App() {
      const [isLoadingDB, setIsLoadingDB] = useState(true);
      const [currentUser, setCurrentUser] = useState(null);
      const [isPublicView, setIsPublicView] = useState(true); 
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [toastMessage, setToastMessage] = useState(null);
      
      const [warga, setWarga] = useState([]);
      const [jadwal, setJadwal] = useState([]);
      const [absensi, setAbsensi] = useState([]);
      const [jimpitan, setJimpitan] = useState([]);
      const [accounts, setAccounts] = useState([]);
      const [dbError, setDbError] = useState(false);
      
      const [settings, setSettings] = useState({ 
        webName: 'e-Jimpitan RT 01', 
        tagline: 'Sistem Keamanan & Keuangan Warga',
        logoUrl: null, 
        nominalJimpitan: 2000, 
        nominalDenda: 10000,
        activePeriode: ''
      });

      const [isDarkMode, setIsDarkMode] = useState(() => {
        try { return localStorage.getItem('isDarkMode') === 'true'; } 
        catch(e) { return false; }
      });
      const [themeColor, setThemeColor] = useState(() => {
        try { return localStorage.getItem('themeColor') || 'blue'; } 
        catch(e) { return 'blue'; }
      });

      useEffect(() => { 
        try { localStorage.setItem('isDarkMode', isDarkMode); } catch(e) {} 
      }, [isDarkMode]);
      
      useEffect(() => { 
        try { localStorage.setItem('themeColor', themeColor); } catch(e) {} 
      }, [themeColor]);

      useEffect(() => {
        const muatData = async () => {
          setIsLoadingDB(true);
          setDbError(false);
          try {
            const dbData = await window.ambilDataDariSpreadsheet();
            
            if (dbData && typeof dbData === 'object' && Object.keys(dbData).length > 0) {
              const rawWarga = dbData.warga && dbData.warga.length > 0 ? dbData.warga : initialWarga;
              const cleanWarga = rawWarga.map(w => {
                 if (w && typeof w === 'object') {
                    const { foto, ...rest } = w;
                    return rest;
                 }
                 return w;
              });
              
              setWarga(cleanWarga);
              setJadwal(dbData.jadwal && dbData.jadwal.length > 0 ? dbData.jadwal : initialJadwal);
              setAbsensi(dbData.absensi && dbData.absensi.length > 0 ? dbData.absensi : initialAbsensi);
              setJimpitan(dbData.jimpitan && dbData.jimpitan.length > 0 ? dbData.jimpitan : initialJimpitan);
              setAccounts(dbData.accounts && dbData.accounts.length > 0 ? dbData.accounts : initialAccounts);
              
              const rawSettings = dbData.settings || {};
              setSettings({
                webName: rawSettings.webName || 'e-Jimpitan RT 01',
                tagline: rawSettings.tagline || 'Sistem Keamanan & Keuangan Warga',
                logoUrl: rawSettings.logoUrl || null,
                nominalJimpitan: Number(rawSettings.nominalJimpitan) || 2000,
                nominalDenda: Number(rawSettings.nominalDenda) || 10000,
                activePeriode: rawSettings.activePeriode || ''
              });
            } else {
              setWarga(initialWarga); setJadwal(initialJadwal); setAbsensi(initialAbsensi); setJimpitan(initialJimpitan); setAccounts(initialAccounts);
            }
          } catch (err) {
            console.error("Gagal terhubung ke Database:", err);
            setDbError(true);
            setWarga(initialWarga); setJadwal(initialJadwal); setAbsensi(initialAbsensi); setJimpitan(initialJimpitan); setAccounts(initialAccounts);
          } finally {
            setIsLoadingDB(false);
          }
        };

        muatData();
      }, []);

      const syncData = async (key, dataArray) => {
         return await window.simpanDataKeSpreadsheet(key, dataArray);
      };

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(null), 3000);
      };

      // SAFETY NET: Hindari fatal error jika localStorage theme tidak valid
      const theme = colorPalettes[themeColor] || colorPalettes['blue'];
      
      const ui = {
        bg: isDarkMode ? 'bg-gray-900 text-gray-100' : 'bg-gray-50 text-gray-800',
        sidebar: isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200',
        card: isDarkMode ? 'bg-gray-800 border-gray-700 shadow-lg text-white' : 'bg-white border-gray-100 shadow text-gray-800',
        input: isDarkMode ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-400 focus:ring-2 focus:ring-opacity-50' : 'bg-white border-gray-300 text-gray-900 focus:ring-2 focus:ring-opacity-50',
        tableHead: isDarkMode ? 'bg-gray-700 text-gray-200 border-gray-600' : 'bg-gray-50 text-gray-700 border-gray-200',
        tableRow: isDarkMode ? 'border-gray-700 hover:bg-gray-750' : 'border-gray-200 hover:bg-gray-50',
      };

      const getWargaName = (id) => warga.find(w => w.id === id)?.nama || 'Unknown';
      const userRole = isPublicView ? 'Publik' : currentUser?.role;
      const isAdmin = currentUser?.role === 'Admin Jimpitan';

      const allMenuItems = [
        { id: 'dashboard', label: 'Dashboard', icon: LayoutDashboard, roles: ['Admin Jimpitan', 'Koordinator', 'Publik'] },
        { id: 'warga', label: 'Data Warga', icon: Users, roles: ['Admin Jimpitan'] },
        { id: 'jadwal_absen', label: 'Jadwal & Absen', icon: CalendarDays, roles: ['Admin Jimpitan', 'Koordinator'] },
        { id: 'scan_keliling', label: 'Scan Jimpitan', icon: Camera, roles: ['Admin Jimpitan', 'Koordinator'] },
        { id: 'rekap', label: 'Rekap Laporan', icon: ClipboardList, roles: ['Admin Jimpitan', 'Koordinator'] },
        { id: 'barcode', label: 'Barcode Rumah', icon: QrCode, roles: ['Admin Jimpitan'] },
        { id: 'pengaturan', label: 'Pengaturan', icon: Settings, roles: ['Admin Jimpitan', 'Koordinator'] },
      ];

      const menuItems = allMenuItems.filter(m => m.roles.includes(userRole));

      const ctx = {
        warga, setWarga, jadwal, setJadwal, absensi, setAbsensi, jimpitan, setJimpitan, accounts, setAccounts, 
        settings, setSettings, currentUser, setCurrentUser, isPublicView, setIsPublicView, activeTab, setActiveTab, 
        isDarkMode, setIsDarkMode, themeColor, setThemeColor, showToast, syncData, theme, ui, getWargaName, userRole, 
        isAdmin
      };

      if (isLoadingDB) {
        return (
          <div className={`min-h-screen flex items-center justify-center font-bold text-lg bg-gray-50 text-gray-800`}>
            <div className="flex flex-col items-center gap-4">
              <ShieldCheck size={64} className="animate-pulse text-blue-500" />
              <p>Menghubungkan ke Database...</p>
            </div>
          </div>
        );
      }

      if (!currentUser && !isPublicView) {
        return <LoginScreen ctx={ctx} />;
      }
      
      if (isPublicView) {
        return (
          <div className={`min-h-screen font-sans ${ui.bg}`}>
            {dbError && (
               <div className="bg-red-500 text-white text-center text-xs py-1 px-4 font-semibold">
                  Gagal terhubung ke server database (Google Apps Script). Menggunakan data default (Offline Mode).
               </div>
            )}
            <header className={`${theme.main} text-white shadow-md sticky top-0 z-50`}>
              <div className="max-w-7xl mx-auto px-4">
                <div className="flex justify-between items-center h-20">
                  <div className="flex items-center gap-3 sm:gap-4">
                    {settings.logoUrl ? (
                       <img src={settings.logoUrl} alt="Logo" className="h-14 sm:h-16 w-auto max-w-[160px] sm:max-w-[200px] object-contain shrink-0 drop-shadow-md" />
                    ) : (
                       <ShieldCheck size={32} className="shrink-0" />
                    )}
                    <div className="flex flex-col justify-center">
                      <h1 className="text-lg sm:text-2xl font-black leading-tight">{settings.webName}</h1>
                      <span className="text-[10px] sm:text-sm opacity-90 leading-tight mt-0.5">{settings.tagline}</span>
                    </div>
                  </div>

                  <div className="flex items-center gap-4">
                    <button onClick={() => setIsDarkMode(!isDarkMode)}>
                      <Sun size={18} />
                    </button>
                    <button onClick={() => setIsPublicView(false)} className="hidden sm:flex items-center gap-2 bg-black/20 px-4 py-2 rounded-lg font-bold">
                      <LogIn size={18} /> Login Petugas
                    </button>
                    <button onClick={() => setIsPublicView(false)} className="flex sm:hidden items-center gap-2 bg-black/20 p-2 rounded-lg font-bold">
                      <LogIn size={18} />
                    </button>
                  </div>
                </div>
              </div>
            </header>
            <main className="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
              <div className="mb-8 text-center sm:text-left">
                <h2 className="text-2xl sm:text-3xl font-black">Portal Transparansi Warga</h2>
              </div>
              <Dashboard ctx={ctx} />
            </main>
          </div>
        );
      }

      return (
        <div className={`flex h-screen font-sans transition-colors duration-200 ${ui.bg}`}>
          {toastMessage && (
            <div className="fixed top-5 right-5 z-[999] animate-fade-in bg-gray-900 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3">
              <CheckCircle size={20} className="text-emerald-400" />
              <span className="font-semibold text-sm">{toastMessage}</span>
            </div>
          )}
          
          {dbError && (
             <div className="fixed bottom-5 right-5 z-[998] bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded shadow-lg text-xs font-bold flex items-center gap-2">
                <AlertCircle size={14} /> Offline Mode Aktif
             </div>
          )}

          {isMobileMenuOpen && <div className="fixed inset-0 bg-black/50 z-40 md:hidden print-hide" onClick={() => setIsMobileMenuOpen(false)} />}
          
          <aside className={`fixed inset-y-0 left-0 w-64 shadow-xl z-50 transform transition-transform md:translate-x-0 md:static md:flex-shrink-0 flex flex-col ${ui.sidebar} ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} print-hide`}>
            <div className={`p-5 border-b flex items-center gap-3 ${theme.main} text-white`}>
              {settings.logoUrl ? (
                 <img src={settings.logoUrl} alt="Logo" className="h-10 sm:h-12 w-auto max-w-[100px] object-contain shrink-0 drop-shadow-md" />
              ) : (
                 <ShieldCheck size={32} className="shrink-0" />
              )}
              <div className="flex flex-col justify-center min-w-0">
                <h1 className="text-lg sm:text-xl font-black truncate leading-tight">{settings.webName}</h1>
                <span className="text-[10px] sm:text-xs opacity-90 truncate leading-tight mt-0.5">{settings.tagline}</span>
              </div>
            </div>
            
            <div className="p-4 border-b flex items-center gap-3">
              <UserCircle size={40} className="text-gray-400" />
              <div>
                <p className="font-bold text-sm leading-tight">{currentUser.nama}</p>
                <p className="text-[10px] uppercase font-bold text-gray-500">{userRole}</p>
              </div>
            </div>
            <div className="flex-1 overflow-y-auto py-4">
              <ul className="space-y-1 px-3">
                {menuItems.map((item) => (
                  <li key={item.id}>
                    <button onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium ${activeTab === item.id ? `${theme.light} ${theme.text}` : 'text-gray-500'}`}>
                      <item.icon size={20} />{item.label}
                    </button>
                  </li>
                ))}
              </ul>
            </div>
            <div className="p-4 border-t">
              <button onClick={() => { setCurrentUser(null); setIsPublicView(true); }} className="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-bold text-red-500 hover:bg-red-50 dark:hover:bg-red-900">
                <LogOut size={20} /> Logout Petugas
              </button>
            </div>
          </aside>

          <main className="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header className={`shadow-sm border-b p-4 flex justify-between items-center md:justify-end print-hide ${ui.sidebar}`}>
              <div className="md:hidden flex items-center gap-4">
                <button onClick={() => setIsMobileMenuOpen(true)}><Menu size={24} /></button>
                <h2 className="text-lg font-bold">{menuItems.find(m => m.id === activeTab)?.label}</h2>
              </div>
              <div className="hidden md:flex text-sm font-medium">{currentUser?.nama} | {currentUser?.role}</div>
            </header>
            <div className="flex-1 overflow-y-auto p-4 md:p-8">
              {activeTab === 'dashboard' && <Dashboard ctx={ctx} />} 
              {activeTab === 'warga' && <DataWarga ctx={ctx} />} 
              {activeTab === 'jadwal_absen' && <JadwalDanAbsen ctx={ctx} />}
              {activeTab === 'scan_keliling' && <ScanJimpitan ctx={ctx} />} 
              {activeTab === 'rekap' && <RekapLaporan ctx={ctx} />} 
              {activeTab === 'barcode' && <BarcodeGenerator ctx={ctx} />}
              {activeTab === 'pengaturan' && <Pengaturan ctx={ctx} />}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
